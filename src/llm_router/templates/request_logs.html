{% extends "base.html" %}
{% block page_content %}
<div class="mb-4 flex items-center justify-between">
  <div>
    <p class="text-xs uppercase tracking-[0.35em] text-slate-400">Requests</p>
    <h1 class="mt-1 text-2xl font-bold">请求日志</h1>
  </div>
  <a href="/admin" class="rounded-xl border border-slate-300 bg-white px-4 py-2 text-xs font-medium text-slate-700 hover:bg-slate-50">返回控制台</a>
</div>

<div class="mb-2">
  <input type="text" id="logs-search" placeholder="搜索日志..." class="w-full rounded-2xl border border-slate-200 px-4 py-2 text-sm">
</div>

<div id="logs-table-container" class="overflow-x-auto rounded-2xl bg-white shadow-sm"></div>
<div id="logs-pagination-container" class="mt-2 flex items-center justify-between"></div>

<script>
let allLogs = {{ logs|tojson }};
let currentPage = 1;
const rowsPerPage = 15;

function renderTable() {
  const searchTerm = document.getElementById('logs-search').value.toLowerCase();
  const filteredLogs = allLogs.filter(log => {
    return log.request_id.toLowerCase().includes(searchTerm) ||
           (log.upstream_request_id && log.upstream_request_id.toLowerCase().includes(searchTerm)) ||
           log.protocol.toLowerCase().includes(searchTerm);
  });

  const tableContainer = document.getElementById('logs-table-container');
  const paginationContainer = document.getElementById('logs-pagination-container');
  tableContainer.innerHTML = '';
  paginationContainer.innerHTML = '';

  if (filteredLogs.length === 0) {
    tableContainer.innerHTML = '<p class="text-center text-slate-500 p-4">没有找到相关日志。</p>';
    return;
  }

  const totalPages = Math.ceil(filteredLogs.length / rowsPerPage);
  const paginatedLogs = filteredLogs.slice((currentPage - 1) * rowsPerPage, currentPage * rowsPerPage);

  const table = document.createElement('table');
  table.className = 'w-full text-sm text-left text-slate-500';
  table.innerHTML = `
    <thead class="text-xs text-slate-700 uppercase bg-slate-50">
      <tr>
        <th scope="col" class="px-6 py-3">Request ID</th>
        <th scope="col" class="px-6 py-3">Protocol</th>
        <th scope="col" class="px-6 py-3">Status</th>
        <th scope="col" class="px-6 py-3">Latency</th>
        <th scope="col" class="px-6 py-3">API Key ID</th>
        <th scope="col" class="px-6 py-3">Provider Model ID</th>
        <th scope="col" class="px-6 py-3 min-w-[120px]">Usage</th>
        <th scope="col" class="px-6 py-3"></th>
      </tr>
    </thead>
    <tbody>
    </tbody>
  `;
  const tbody = table.querySelector('tbody');
  paginatedLogs.forEach(log => {
    const tr = document.createElement('tr');
    tr.className = 'bg-white border-b';
    let usageHtml = '-';
    if (log.usage_record) {
      const cost = log.usage_record.cost_total ? parseFloat(log.usage_record.cost_total).toFixed(6) : 'N/A';
      usageHtml = `P: ${log.usage_record.prompt_tokens}, C: ${log.usage_record.completion_tokens}<br>${cost}`;
    }
    tr.innerHTML = `
      <td class="px-6 py-2.5 font-medium text-slate-900">${log.request_id}</td>
      <td class="px-6 py-2.5">${log.protocol}</td>
      <td class="px-6 py-2.5">${log.success ? '<span class="text-emerald-600">Success</span>' : '<span class="text-rose-600">Failed</span>'} (${log.status_code})</td>
      <td class="px-6 py-2.5">${log.latency_ms || "-"}ms</td>
      <td class="px-6 py-2.5">${log.api_key_id || "-"}</td>
      <td class="px-6 py-2.5">${log.provider_model_id || "-"}</td>
      <td class="px-6 py-2.5 min-w-[120px] text-xs">${usageHtml}</td>
      <td class="px-6 py-2.5">
        <a href="/admin/requests/${log.id}" class="whitespace-nowrap rounded-lg border border-slate-200 px-3 py-1.5 text-xs">详情</a>
      </td>
    `;
    tbody.appendChild(tr);
  });
  tableContainer.appendChild(table);

  // Pagination
  if (totalPages > 1) {
    const prevButton = document.createElement('button');
    prevButton.textContent = '上一页';
    prevButton.className = 'rounded-lg border px-3 py-1.5 text-xs';
    prevButton.disabled = currentPage === 1;
    prevButton.onclick = () => {
      currentPage--;
      renderTable();
    };
    paginationContainer.appendChild(prevButton);

    const pageInfo = document.createElement('span');
    pageInfo.textContent = `第 ${currentPage} / ${totalPages} 页`;
    pageInfo.className = 'text-xs text-slate-500';
    paginationContainer.appendChild(pageInfo);

    const nextButton = document.createElement('button');
    nextButton.textContent = '下一页';
    nextButton.className = 'rounded-lg border px-3 py-1.5 text-xs';
    nextButton.disabled = currentPage === totalPages;
    nextButton.onclick = () => {
      currentPage++;
      renderTable();
    };
    paginationContainer.appendChild(nextButton);
  }
}

document.getElementById('logs-search').addEventListener('input', () => {
  currentPage = 1;
  renderTable();
});

document.addEventListener('DOMContentLoaded', () => {
  renderTable();
});
</script>
{% endblock %}
