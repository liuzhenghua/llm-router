{% extends "base.html" %}
{% block page_content %}
<div class="mx-auto mt-24 max-w-md rounded-[2rem] bg-white p-9 shadow-2xl shadow-slate-200/70">
  <div class="mb-8">
    <p class="text-sm uppercase tracking-[0.35em] text-sky-500">First-Time Setup</p>
    <h1 class="mt-3 text-3xl font-bold text-slate-900">初始化超管账号</h1>
    <p class="mt-3 text-xs leading-6 text-slate-500">系统尚未配置任何管理员账号。请设置一个超级管理员账号以继续使用控制台。</p>
  </div>
  {% if error %}
  <div class="mb-4 rounded-2xl border border-rose-200 bg-rose-50 px-4 py-3 text-sm text-rose-700">{{ error }}</div>
  {% endif %}
  <form method="post" action="/admin/setup" class="space-y-5">
    <label class="block">
      <span class="mb-2 block text-xs font-medium text-slate-600">用户名</span>
      <input name="username" autocomplete="username" autofocus
             class="w-full rounded-2xl border border-slate-200 px-4 py-2.5 text-sm outline-none transition focus:border-sky-400"
             required placeholder="admin">
    </label>
    <label class="block">
      <span class="mb-2 block text-xs font-medium text-slate-600">密码</span>
      <input type="password" name="password" autocomplete="new-password"
             class="w-full rounded-2xl border border-slate-200 px-4 py-2.5 text-sm outline-none transition focus:border-sky-400"
             required placeholder="至少 6 位">
    </label>
    <label class="block">
      <span class="mb-2 block text-xs font-medium text-slate-600">确认密码</span>
      <input type="password" name="confirm_password" autocomplete="new-password"
             class="w-full rounded-2xl border border-slate-200 px-4 py-2.5 text-sm outline-none transition focus:border-sky-400"
             required placeholder="再次输入密码">
    </label>
    <button type="submit"
            class="w-full rounded-2xl bg-slate-950 px-4 py-2.5 text-sm font-medium text-white transition hover:bg-slate-800">
      完成初始化
    </button>
  </form>
</div>
{% endblock %}
