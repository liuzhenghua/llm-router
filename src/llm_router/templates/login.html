{% extends "base.html" %}
{% block page_content %}
<div class="mx-auto mt-24 max-w-md rounded-[2rem] bg-white p-9 shadow-2xl shadow-slate-200/70">
  <div class="mb-8">
    <p class="text-sm uppercase tracking-[0.35em] text-sky-500">Admin Login</p>
    <h1 class="mt-3 text-3xl font-bold text-slate-900">欢迎回来</h1>
    <p class="mt-3 text-xs leading-6 text-slate-500">使用管理员账号进入控制台。按 Enter 也可以直接提交登录。</p>
  </div>
  {% if error %}
  <div class="mb-4 rounded-2xl border border-rose-200 bg-rose-50 px-4 py-3 text-sm text-rose-700">{{ error }}</div>
  {% endif %}
  <form method="post" action="/admin/login" class="space-y-5">
    <label class="block">
      <span class="mb-2 block text-xs font-medium text-slate-600">用户名</span>
      <input name="username" autocomplete="username" autofocus class="w-full rounded-2xl border border-slate-200 px-4 py-2.5 text-sm outline-none transition focus:border-sky-400" required>
    </label>
    <label class="block">
      <span class="mb-2 block text-xs font-medium text-slate-600">密码</span>
      <input type="password" name="password" autocomplete="current-password" class="w-full rounded-2xl border border-slate-200 px-4 py-2.5 text-sm outline-none transition focus:border-sky-400" required>
    </label>
    <button type="submit" class="w-full rounded-2xl bg-slate-950 px-4 py-2.5 text-sm font-medium text-white transition hover:bg-slate-800">登录</button>
  </form>
</div>
{% endblock %}
