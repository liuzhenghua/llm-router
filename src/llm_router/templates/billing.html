{% extends "base.html" %}
{% block page_content %}
<div class="sticky top-0 z-10 -mx-3 lg:-mx-5 -mt-4 lg:-mt-5 mb-6 border-b border-slate-200/70 bg-white/90 px-3 py-2.5 backdrop-blur-sm lg:px-5">
  <p class="text-xs uppercase tracking-[0.35em] text-slate-400" data-i18n="billing.page_title">Billing</p>
  <h1 class="mt-0.5 text-xl font-semibold tracking-tight text-slate-900" data-i18n="billing.title">账单与账本</h1>
</div>

<!-- ── API Key filter ── -->
<div class="mb-6 rounded-2xl bg-white p-4 shadow-sm">
  <form method="get" action="/admin/billing" class="flex flex-wrap items-end gap-3">
    <div>
      <label class="mb-1 block text-xs text-slate-500" data-i18n="billing.lbl_api_key">API Key</label>
      <select name="api_key_id" class="rounded-xl border border-slate-200 px-3 py-1.5 text-xs">
        <option value="" data-i18n="billing.all_keys">全部 API Key</option>
        {% for api_key in api_keys %}
        <option value="{{ api_key.id }}" {% if selected_api_key_id == api_key.id %}selected{% endif %}>{{ api_key.name }}</option>
        {% endfor %}
      </select>
    </div>
    <button class="rounded-xl bg-slate-800 px-3 py-1.5 text-xs font-medium text-white hover:bg-slate-700" data-i18n="billing.btn_filter">筛选</button>
    {% if selected_api_key_id %}
    <a href="/admin/billing" class="rounded-xl border border-slate-300 px-3 py-1.5 text-xs font-medium text-slate-700 hover:bg-slate-50" data-i18n="billing.btn_reset">重置</a>
    {% endif %}
  </form>
</div>

<div class="space-y-6">

  <!-- 账本 -->
  <div class="rounded-2xl bg-white p-4 shadow-sm">
    <p class="mb-3 text-xs font-semibold uppercase tracking-wider text-slate-500" data-i18n="billing.ledger_title">账本流水</p>
    <div class="mb-3 flex flex-wrap gap-2 items-end">
      <div class="min-w-[160px] flex-1">
        <input type="text" id="ledgers-search" placeholder="搜索备注..." data-i18n-placeholder="billing.search_remark" class="w-full rounded-xl border border-slate-200 px-3 py-1.5 text-xs">
      </div>
      <div class="shrink-0">
        <select id="ledgers-change-type" class="rounded-xl border border-slate-200 px-3 py-1.5 text-xs">
          <option value="" data-i18n="billing.all_types">全部类型</option>
          <option value="topup" data-i18n="billing.topup_label">充値 (topup)</option>
          <option value="charge" data-i18n="billing.charge_label">扣费 (charge)</option>
          <option value="adjust" data-i18n="billing.adjust_label">调整 (adjust)</option>
          <option value="refund" data-i18n="billing.refund_label">退款 (refund)</option>
        </select>
      </div>
      <div class="flex gap-2 shrink-0">
        <button id="ledgers-search-btn" class="rounded-xl bg-slate-800 px-3 py-1.5 text-xs text-white font-medium hover:bg-slate-700" data-i18n="common.search">搜索</button>
        <button id="ledgers-reset-btn" class="rounded-xl border border-slate-300 px-3 py-1.5 text-xs text-slate-700 font-medium hover:bg-slate-50" data-i18n="common.reset">重置</button>
      </div>
    </div>
    <div id="ledgers-table-container" class="overflow-x-auto"></div>
    <div id="ledgers-pagination-container" class="mt-3 flex items-center justify-between"></div>
  </div>

  <!-- 费用记录 -->
  <div class="rounded-2xl bg-white p-4 shadow-sm">
    <p class="mb-3 text-xs font-semibold uppercase tracking-wider text-slate-500" data-i18n="billing.usage_title">请求费用记录</p>
    <div class="mb-3">
      <input type="text" id="usage-search" placeholder="搜索 Request ID..." data-i18n-placeholder="billing.search_request" class="w-full rounded-xl border border-slate-200 px-3 py-1.5 text-xs">
    </div>
    <div id="usage-table-container" class="overflow-x-auto"></div>
    <div id="usage-pagination-container" class="mt-3 flex items-center justify-between"></div>
  </div>

  <!-- 日报 -->
  <div class="rounded-2xl bg-white p-4 shadow-sm">
    <p class="mb-3 text-xs font-semibold uppercase tracking-wider text-slate-500" data-i18n="billing.daily_title">每日费用日报</p>
    <div class="mb-3">
      <input type="text" id="summaries-search" placeholder="搜索日期或 API Key..." data-i18n-placeholder="billing.search_daily" class="w-full rounded-xl border border-slate-200 px-3 py-1.5 text-xs">
    </div>
    <div id="summaries-table-container" class="overflow-x-auto"></div>
    <div id="summaries-pagination-container" class="mt-3 flex items-center justify-between"></div>
  </div>

</div>

<script>
function createPaginatedTable(config) {
  let allData = config.data;
  let currentPage = 1;
  const rowsPerPage = config.rowsPerPage || 10;

  function render() {
    const searchTerm = document.getElementById(config.searchId).value.toLowerCase();
    const filteredData = allData.filter(item => config.filterFn(item, searchTerm));

    const tableContainer = document.getElementById(config.tableContainerId);
    const paginationContainer = document.getElementById(config.paginationContainerId);
    tableContainer.innerHTML = '';
    paginationContainer.innerHTML = '';

    const noData = typeof config.noDataText === 'function' ? config.noDataText() : config.noDataText;
    if (filteredData.length === 0) {
      tableContainer.innerHTML = `<p class="text-center text-slate-500 p-4">${noData}</p>`;
      return;
    }

    const totalPages = Math.ceil(filteredData.length / rowsPerPage);
    const paginatedData = filteredData.slice((currentPage - 1) * rowsPerPage, currentPage * rowsPerPage);

    const table = document.createElement('table');
    table.className = 'w-full text-sm text-left text-slate-500';
    const hdrs = typeof config.headers === 'function' ? config.headers() : config.headers;
    table.innerHTML = `
      <thead class="text-xs text-slate-700 uppercase bg-slate-50">
        <tr>
          ${hdrs.map(h => `<th scope="col" class="px-2 py-3 whitespace-nowrap">${h}</th>`).join('')}
        </tr>
      </thead>
      <tbody>
        ${paginatedData.map(item => `<tr class="bg-white border-b">${config.rowFn(item)}</tr>`).join('')}
      </tbody>
    `;
    tableContainer.appendChild(table);

    const paginDiv = document.createElement('div');
    paginDiv.className = 'flex items-center gap-2';

    const prevButton = document.createElement('button');
    prevButton.textContent = t('common.prev_page');
    prevButton.className = 'rounded-lg border px-3 py-1.5 text-xs' + (currentPage === 1 ? ' text-slate-400' : '');
    prevButton.disabled = currentPage === 1;
    prevButton.onclick = () => { currentPage--; render(); };
    paginDiv.appendChild(prevButton);

    const pageInfo = document.createElement('span');
    pageInfo.textContent = t('common.page_info').replace('{cur}', currentPage).replace('{total}', totalPages);
    pageInfo.className = 'text-xs text-slate-500';
    paginDiv.appendChild(pageInfo);

    const nextButton = document.createElement('button');
    nextButton.textContent = t('common.next_page');
    nextButton.className = 'rounded-lg border px-3 py-1.5 text-xs' + (currentPage === totalPages ? ' text-slate-400' : '');
    nextButton.disabled = currentPage === totalPages;
    nextButton.onclick = () => { currentPage++; render(); };
    paginDiv.appendChild(nextButton);

    paginationContainer.appendChild(paginDiv);
  }

  document.getElementById(config.searchId).addEventListener('input', () => {
    currentPage = 1;
    render();
  });

  render();
  return { render, resetPage: () => { currentPage = 1; } };
}

document.addEventListener('DOMContentLoaded', () => {
  const ledgersTable = createPaginatedTable({
    data: {{ ledgers|tojson }},
    searchId: 'ledgers-search',
    tableContainerId: 'ledgers-table-container',
    paginationContainerId: 'ledgers-pagination-container',
    noDataText: () => t('billing.no_ledger'),
    headers: () => [t('billing.col_type'), t('billing.col_amount'), 'API Key', t('billing.col_before'), t('billing.col_after'), t('billing.col_remark')],
    filterFn: (item, term) => {
      const changeType = document.getElementById('ledgers-change-type').value;
      if (changeType && item.change_type !== changeType) return false;
      return !term || item.change_type.toLowerCase().includes(term) || (item.remark && item.remark.toLowerCase().includes(term));
    },
    rowFn: item => `
      <td class="px-2 py-2 text-xs whitespace-nowrap">${
        item.change_type === 'topup'
          ? '<span class="inline-flex items-center rounded-full bg-emerald-50 px-2 py-0.5 text-xs font-medium text-emerald-700">topup</span>'
          : item.change_type === 'charge'
          ? '<span class="inline-flex items-center rounded-full bg-rose-50 px-2 py-0.5 text-xs font-medium text-rose-700">charge</span>'
          : `<span class="inline-flex items-center rounded-full bg-slate-100 px-2 py-0.5 text-xs font-medium text-slate-600">${item.change_type}</span>`
      }</td>
      <td class="px-2 py-2 text-xs font-medium text-slate-900 whitespace-nowrap">${item.amount}</td>
      <td class="px-2 py-2 text-xs whitespace-nowrap">${item.api_key_name || item.api_key_id}</td>
      <td class="px-2 py-2 text-xs whitespace-nowrap">${item.balance_before}</td>
      <td class="px-2 py-2 text-xs whitespace-nowrap">${item.balance_after}</td>
      <td class="px-2 py-2 text-xs">${item.remark || '-'}</td>
    `
  });

  document.getElementById('ledgers-search-btn').addEventListener('click', () => { ledgersTable.resetPage(); ledgersTable.render(); });
  document.getElementById('ledgers-reset-btn').addEventListener('click', () => {
    document.getElementById('ledgers-search').value = '';
    document.getElementById('ledgers-change-type').value = '';
    ledgersTable.resetPage();
    ledgersTable.render();
  });
  document.getElementById('ledgers-search').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { ledgersTable.resetPage(); ledgersTable.render(); }
  });
  document.getElementById('ledgers-change-type').addEventListener('change', () => { ledgersTable.resetPage(); ledgersTable.render(); });

  const usageTable = createPaginatedTable({
    data: {{ usage_records|tojson }},
    searchId: 'usage-search',
    tableContainerId: 'usage-table-container',
    paginationContainerId: 'usage-pagination-container',
    noDataText: () => t('billing.no_usage'),
    headers: ['Request Log ID', 'Cost', 'Tokens (P/C/R)', 'Request ID'],
    filterFn: (item, term) => String(item.request_log_id).includes(term) || (item.request_log && item.request_log.request_id.toLowerCase().includes(term)),
    rowFn: item => `
      <td class="px-2 py-2 text-xs whitespace-nowrap">${item.request_log_id}</td>
      <td class="px-2 py-2 text-xs whitespace-nowrap">${item.cost_total}</td>
      <td class="px-2 py-2 text-xs whitespace-nowrap">${item.prompt_tokens} / ${item.completion_tokens} / ${item.reasoning_tokens}</td>
      <td class="px-2 py-2 text-xs">${item.request_log ? item.request_log.request_id : '-'}</td>
    `
  });

  const summariesTable = createPaginatedTable({
    data: {{ summaries|tojson }},
    searchId: 'summaries-search',
    tableContainerId: 'summaries-table-container',
    paginationContainerId: 'summaries-pagination-container',
    noDataText: () => t('billing.no_daily'),
    headers: () => ['API Key', t('statistics.col_date'), t('billing.col_requests'), t('billing.col_cost'), 'Tokens (P/C/R)'],
    filterFn: (item, term) => (item.api_key_name || String(item.api_key_id)).toLowerCase().includes(term) || item.summary_date.includes(term),
    rowFn: item => `
      <td class="px-2 py-2 text-xs whitespace-nowrap">${item.api_key_name || item.api_key_id}</td>
      <td class="px-2 py-2 text-xs whitespace-nowrap">${item.summary_date}</td>
      <td class="px-2 py-2 text-xs whitespace-nowrap">${item.request_count}</td>
      <td class="px-2 py-2 text-xs whitespace-nowrap">${item.cost_total}</td>
      <td class="px-2 py-2 text-xs whitespace-nowrap">${item.prompt_tokens} / ${item.completion_tokens} / ${item.reasoning_tokens}</td>
    `
  });
  window.i18n && window.i18n.onLangChange(ledgersTable.render);
  window.i18n && window.i18n.onLangChange(usageTable.render);
  window.i18n && window.i18n.onLangChange(summariesTable.render);
});
</script>
{% endblock %}
