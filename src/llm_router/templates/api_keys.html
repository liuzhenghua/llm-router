{% extends "base.html" %}
{% block page_content %}

<style>
  .dropdown-items div:active {
    background-color: #f0f9ff; /* sky-50 */
  }
  .selected-tags span {
    transition: all 0.2s;
  }
</style>

<div class="mb-4 flex items-center justify-between">
  <div>
    <p class="text-xs uppercase tracking-[0.35em] text-sky-600">API Keys</p>
    <h1 class="mt-1 text-2xl font-bold">API Key 管理</h1>
  </div>
  <button type="button" onclick="openModal('create-api-key-modal')" class="rounded-2xl bg-slate-950 px-4 py-2.5 text-xs font-medium text-white">新增 API Key</button>
</div>

{% if raw_api_key %}
<div class="mb-4 rounded-2xl border border-emerald-200 bg-emerald-50 px-5 py-3 text-sm text-emerald-800">
  新建 API Key 明文，仅展示一次：<code class="font-semibold">{{ raw_api_key }}</code>
</div>
{% endif %}

<div class="mb-2">
  <input type="text" id="api-keys-search" placeholder="搜索 API Keys..." class="w-full rounded-2xl border border-slate-200 px-4 py-2 text-sm">
</div>

<div id="api-keys-table-container" class="overflow-x-auto rounded-2xl bg-white shadow-sm"></div>
<div id="api-keys-pagination-container" class="mt-2 flex items-center justify-between"></div>

<!-- Shared Edit Modal -->
<dialog id="edit-api-key-modal" class="w-full max-w-3xl rounded-[2rem] p-0 backdrop:bg-slate-950/40">
  <div class="rounded-[2rem] bg-white p-8">
    <div class="mb-6 flex items-center justify-between">
      <h3 class="text-2xl font-semibold">编辑 API Key</h3>
      <button type="button" onclick="closeModal('edit-api-key-modal')" class="rounded-full px-3 py-1 text-slate-500 hover:text-slate-700">关闭</button>
    </div>
    <form id="edit-api-key-form" class="grid gap-4 md:grid-cols-2">
      <input type="hidden" name="id" id="edit-id">
      <label class="block"><span class="mb-2 block text-sm text-slate-600">名称</span><input name="name" required class="w-full rounded-2xl border border-slate-200 px-4 py-3"></label>
      <label class="block"><span class="mb-2 block text-sm text-slate-600">状态</span><select name="status" class="w-full rounded-2xl border border-slate-200 px-4 py-3"><option value="active">active</option><option value="disabled">disabled</option></select></label>
      <label class="block"><span class="mb-2 block text-sm text-slate-600">日限额 <span class="text-slate-400">留空不限制</span></span><input name="daily_budget_limit" placeholder="例如 100" class="w-full rounded-2xl border border-slate-200 px-4 py-3"></label>
      <label class="block"><span class="mb-2 block text-sm text-slate-600">QPS 限制</span><input name="qps_limit" type="number" min="1" class="w-full rounded-2xl border border-slate-200 px-4 py-3"></label>
      <div class="block md:col-span-2">
        <span class="mb-2 block text-sm text-slate-600">允许访问的逻辑模型</span>
        <div class="model-selector" id="model-selector-edit">
          <div class="selected-tags flex flex-wrap gap-2 mb-2 min-h-[32px]"></div>
          <div class="dropdown-wrapper relative">
            <input type="text" class="model-search w-full rounded-2xl border border-slate-200 px-4 py-3 text-sm" placeholder="搜索模型...">
            <div class="dropdown hidden absolute bottom-full left-0 right-0 z-10 mb-1 max-h-60 overflow-y-auto rounded-2xl border border-slate-200 bg-white shadow-lg">
              <div class="sticky top-0 flex gap-2 border-b border-slate-100 bg-white px-3 py-2">
                <button type="button" class="select-all text-xs text-sky-600 hover:text-sky-800">全选</button>
                <button type="button" class="clear-all text-xs text-slate-500 hover:text-slate-700">清空</button>
              </div>
              <div class="dropdown-items"></div>
            </div>
          </div>
          <input type="hidden" name="allowed_models" class="hidden-input" value="">
        </div>
      </div>
      <label class="flex items-center gap-2 rounded-2xl border border-slate-200 px-4 py-3 text-sm text-slate-600"><input type="checkbox" name="request_content_logging_enabled" value="true">记录请求内容</label>
      <label class="flex items-center gap-2 rounded-2xl border border-slate-200 px-4 py-3 text-sm text-slate-600"><input type="checkbox" name="response_content_logging_enabled" value="true">记录响应内容</label>
      <button type="submit" class="rounded-2xl bg-slate-950 px-4 py-3 text-white md:col-span-2">保存</button>
    </form>
  </div>
</dialog>

<!-- Shared Topup Modal -->
<dialog id="topup-api-key-modal" class="w-full max-w-xl rounded-[2rem] p-0 backdrop:bg-slate-950/40">
  <div class="rounded-[2rem] bg-white p-8">
    <div class="mb-6 flex items-center justify-between">
      <h3 class="text-2xl font-semibold">充值</h3>
      <button type="button" onclick="closeModal('topup-api-key-modal')" class="rounded-full px-3 py-1 text-slate-500 hover:text-slate-700">关闭</button>
    </div>
    <form id="topup-api-key-form" class="grid gap-4">
      <input type="hidden" name="id" id="topup-id">
      <label><span class="mb-2 block text-sm text-slate-600">充值金额</span><input name="amount" type="number" step="0.01" min="0.01" value="10" required class="w-full rounded-2xl border border-slate-200 px-4 py-3"></label>
      <label><span class="mb-2 block text-sm text-slate-600">备注</span><input name="remark" placeholder="例如 手动充值" class="w-full rounded-2xl border border-slate-200 px-4 py-3"></label>
      <button type="submit" class="rounded-2xl bg-emerald-600 px-4 py-3 text-white hover:bg-emerald-700">确认充值</button>
    </form>
  </div>
</dialog>

<!-- Create Modal -->
<dialog id="create-api-key-modal" class="w-full max-w-3xl rounded-[2rem] p-0 backdrop:bg-slate-950/40">
  <div class="rounded-[2rem] bg-white p-8">
    <div class="mb-6 flex items-center justify-between">
      <h3 class="text-2xl font-semibold">创建 API Key</h3>
      <button type="button" onclick="closeModal('create-api-key-modal')" class="rounded-full px-3 py-1 text-slate-500 hover:text-slate-700">关闭</button>
    </div>
    <form method="post" action="/admin/api-keys" class="grid gap-4 md:grid-cols-2" id="create-api-key-form">
      <label><span class="mb-2 block text-sm text-slate-600">名称</span><input name="name" required class="w-full rounded-2xl border border-slate-200 px-4 py-3"></label>
      <label><span class="mb-2 block text-sm text-slate-600">初始余额</span><input name="balance" type="number" step="0.01" min="0" value="0" class="w-full rounded-2xl border border-slate-200 px-4 py-3"></label>
      <label><span class="mb-2 block text-sm text-slate-600">日限额 <span class="text-slate-400">留空不限制</span></span><input name="daily_budget_limit" placeholder="例如 100" class="w-full rounded-2xl border border-slate-200 px-4 py-3"></label>
      <label><span class="mb-2 block text-sm text-slate-600">QPS 限制</span><input name="qps_limit" type="number" min="1" value="5" class="w-full rounded-2xl border border-slate-200 px-4 py-3"></label>
      <div class="block md:col-span-2">
        <span class="mb-2 block text-sm text-slate-600">允许访问的逻辑模型</span>
        <div class="model-selector" id="model-selector-create">
          <div class="selected-tags flex flex-wrap gap-2 mb-2 min-h-[32px]"></div>
          <div class="dropdown-wrapper relative">
            <input type="text" class="model-search w-full rounded-2xl border border-slate-200 px-4 py-3 text-sm" placeholder="搜索模型...">
            <div class="dropdown hidden absolute bottom-full left-0 right-0 z-10 mb-1 max-h-60 overflow-y-auto rounded-2xl border border-slate-200 bg-white shadow-lg">
              <div class="sticky top-0 flex gap-2 border-b border-slate-100 bg-white px-3 py-2">
                <button type="button" class="select-all text-xs text-sky-600 hover:text-sky-800">全选</button>
                <button type="button" class="clear-all text-xs text-slate-500 hover:text-slate-700">清空</button>
              </div>
              <div class="dropdown-items"></div>
            </div>
          </div>
          <input type="hidden" name="allowed_models" class="hidden-input" value="">
        </div>
      </div>
      <button type="submit" class="rounded-2xl bg-slate-950 px-4 py-3 text-white md:col-span-2">创建 API Key</button>
    </form>
  </div>
</dialog>

<script>
let allApiKeys = {{ api_keys|tojson }};
let currentPage = 1;
const rowsPerPage = 10;

function renderTable() {
  const searchTerm = document.getElementById('api-keys-search').value.toLowerCase();
  const filteredKeys = allApiKeys.filter(key => {
    return key.name.toLowerCase().includes(searchTerm) ||
           key.status.toLowerCase().includes(searchTerm);
  });

  const tableContainer = document.getElementById('api-keys-table-container');
  const paginationContainer = document.getElementById('api-keys-pagination-container');
  tableContainer.innerHTML = '';
  paginationContainer.innerHTML = '';

  if (filteredKeys.length === 0) {
    tableContainer.innerHTML = '<p class="text-center text-slate-500 p-4">没有找到相关 API Key。</p>';
    return;
  }

  const totalPages = Math.ceil(filteredKeys.length / rowsPerPage);
  const paginatedKeys = filteredKeys.slice((currentPage - 1) * rowsPerPage, currentPage * rowsPerPage);

  const table = document.createElement('table');
  table.className = 'w-full text-sm text-left text-slate-500';
  table.innerHTML = `
    <thead class="text-xs text-slate-700 uppercase bg-slate-50">
      <tr>
        <th scope="col" class="px-6 py-3">名称</th>
        <th scope="col" class="px-6 py-3">状态</th>
        <th scope="col" class="px-6 py-3">余额</th>
        <th scope="col" class="px-6 py-3">今日消费</th>
        <th scope="col" class="px-6 py-3">QPS</th>
        <th scope="col" class="px-6 py-3">操作</th>
      </tr>
    </thead>
    <tbody>
    </tbody>
  `;
  const tbody = table.querySelector('tbody');
  paginatedKeys.forEach(item => {
    const tr = document.createElement('tr');
    tr.className = 'bg-white border-b';
    tr.innerHTML = `
      <td class="px-6 py-2.5 font-medium text-slate-900">${item.name}</td>
      <td class="px-6 py-2.5">${item.status === 'active' ? '<span class="inline-flex items-center rounded-full bg-emerald-50 px-2.5 py-0.5 text-xs font-medium text-emerald-700">active</span>' : '<span class="inline-flex items-center rounded-full bg-rose-50 px-2.5 py-0.5 text-xs font-medium text-rose-700">disabled</span>'}</td>
      <td class="px-6 py-2.5">${item.balance}</td>
      <td class="px-6 py-2.5">${item.daily_spend_amount}</td>
      <td class="px-6 py-2.5">${item.qps_limit}</td>
      <td class="px-6 py-2.5 flex gap-2">
        <button type="button" onclick='openEditModal(${JSON.stringify(item)})' class="rounded-lg border border-slate-200 px-3 py-1.5 text-xs">编辑</button>
        <button type="button" onclick='openTopupModal(${JSON.stringify(item)})' class="rounded-lg border border-emerald-200 bg-emerald-50 px-3 py-1.5 text-xs text-emerald-700">充值</button>
        ${item.status === 'active' ? `<button type="button" onclick="disableApiKey(${item.id}, '${item.name}')" class="rounded-lg border border-rose-200 bg-rose-50 px-3 py-1.5 text-xs text-rose-700">禁用</button>` : `<button type="button" onclick="enableApiKey(${item.id}, '${item.name}')" class="rounded-lg border border-emerald-200 bg-emerald-50 px-3 py-1.5 text-xs text-emerald-700">启用</button>`}
      </td>
    `;
    tbody.appendChild(tr);
  });
  tableContainer.appendChild(table);

  // Pagination
  if (totalPages > 1) {
    const prevButton = document.createElement('button');
    prevButton.textContent = '上一页';
    prevButton.className = 'rounded-lg border px-3 py-1.5 text-xs';
    prevButton.disabled = currentPage === 1;
    prevButton.onclick = () => {
      currentPage--;
      renderTable();
    };
    paginationContainer.appendChild(prevButton);

    const pageInfo = document.createElement('span');
    pageInfo.textContent = `第 ${currentPage} / ${totalPages} 页`;
    pageInfo.className = 'text-xs text-slate-500';
    paginationContainer.appendChild(pageInfo);

    const nextButton = document.createElement('button');
    nextButton.textContent = '下一页';
    nextButton.className = 'rounded-lg border px-3 py-1.5 text-xs';
    nextButton.disabled = currentPage === totalPages;
    nextButton.onclick = () => {
      currentPage++;
      renderTable();
    };
    paginationContainer.appendChild(nextButton);
  }
}

document.getElementById('api-keys-search').addEventListener('input', () => {
  currentPage = 1;
  renderTable();
});

document.addEventListener('DOMContentLoaded', () => {
  renderTable();
});

var logicalModels = [
  {% for model in logical_models %}
    {id: {{ model.id }}, name: "{{ model.name }}"},
  {% endfor %}
];

// ===== Model Selector v2（稳定版）=====
function createModelSelector(selector, initialSelected) {
  if (selector._inited) return;

  const state = {
    selected: Array.isArray(initialSelected) ? [...initialSelected] : [],
    all: logicalModels.map(m => m.name)
  };

  const els = {
    dropdown: selector.querySelector('.dropdown'),
    items: selector.querySelector('.dropdown-items'),
    search: selector.querySelector('.model-search'),
    tags: selector.querySelector('.selected-tags'),
    hidden: selector.querySelector('.hidden-input'),
    selectAll: selector.querySelector('.select-all'),
    clearAll: selector.querySelector('.clear-all')
  };

  selector._state = state;
  selector._els = els;

  function renderTags() {
    els.tags.innerHTML = '';
    state.selected.forEach(name => {
      const tag = document.createElement('span');
      tag.className = 'inline-flex items-center gap-1 rounded-full bg-slate-100 text-slate-700 border border-slate-200 px-3 py-1 text-sm cursor-default';

      const labelNode = document.createTextNode(name);
      const button = document.createElement('button');
      button.type = 'button';
      button.className = 'delete-btn ml-1 text-slate-400 hover:text-rose-500 transition-colors font-bold text-lg leading-none';
      button.textContent = '×';
      button.addEventListener('click', (e) => {
        e.preventDefault();
        e.stopPropagation();
        state.selected = state.selected.filter(n => n !== name);
        sync();
      });

      tag.appendChild(labelNode);
      tag.appendChild(button);
      els.tags.appendChild(tag);
    });
  }

  function renderDropdown() {
    const keyword = els.search.value.toLowerCase();
    els.items.innerHTML = '';
    const list = state.all.filter(name => name.toLowerCase().includes(keyword));

    if (!list.length) {
      els.items.innerHTML = '<div class="px-4 py-2 text-slate-400">无匹配模型</div>';
      return;
    }

    list.forEach(name => {
      const isSelected = state.selected.includes(name);
      const item = document.createElement('div');
      item.className = `cursor-pointer px-4 py-2.5 flex justify-between items-center hover:bg-slate-50 transition-colors ${isSelected ? 'bg-sky-50/50 text-sky-700' : 'text-slate-700'}`;
      item.innerHTML = `<span>${name}</span>${isSelected ? '<span class="font-bold">✓</span>' : ''}`;

      item.onclick = (e) => {
        e.preventDefault();
        e.stopPropagation(); // 阻止冒泡到 document 导致下拉框关闭
        if (isSelected) {
          state.selected = state.selected.filter(n => n !== name);
        } else {
          state.selected.push(name);
        }
        sync();
      };
      els.items.appendChild(item);
    });
  }

  function sync() {
    els.hidden.value = state.selected.join(',');
    renderTags();
    renderDropdown();
  }

  selector._sync = sync;

  // 搜索框事件
  els.search.onfocus = () => {
    els.dropdown.classList.remove('hidden');
    renderDropdown();
  };

  els.search.oninput = renderDropdown;

  // 全选/清空
  els.selectAll.onclick = (e) => {
    e.preventDefault();
    e.stopPropagation();
    const keyword = els.search.value.toLowerCase();
    const visible = state.all.filter(name => name.toLowerCase().includes(keyword));
    state.selected = Array.from(new Set([...state.selected, ...visible]));
    sync();
  };

  els.clearAll.onclick = (e) => {
    e.preventDefault();
    e.stopPropagation();
    state.selected = [];
    sync();
  };

  // 点击外部关闭
  const closeDropdown = (e) => {
    if (!selector.contains(e.target)) {
      els.dropdown.classList.add('hidden');
    }
  };
  document.addEventListener('click', closeDropdown);

  sync();
  selector._inited = true;
}

// ===== Edit Modal（稳定版）=====
function openEditModal(item) {
  const selector = document.getElementById('model-selector-edit');

  document.getElementById('edit-id').value = item.id;
  const form = document.getElementById('edit-api-key-form');
  form.querySelector('[name="name"]').value = item.name;
  form.querySelector('[name="status"]').value = item.status;
  form.querySelector('[name="daily_budget_limit"]').value = item.daily_budget_limit || '';
  form.querySelector('[name="qps_limit"]').value = item.qps_limit;
  form.querySelector('[name="request_content_logging_enabled"]').checked = item.request_content_logging_enabled;
  form.querySelector('[name="response_content_logging_enabled"]').checked = item.response_content_logging_enabled;

  const models = item.allowed_logical_models_json || [];

  if (!selector._inited) {
    createModelSelector(selector, models);
  } else {
    selector._state.selected = [...models];
    selector._els.search.value = '';
    selector._sync();
  }

  openModal('edit-api-key-modal');
}

// ---- Edit Modal Submit ----
document.getElementById('edit-api-key-form').addEventListener('submit', function(e) {
  e.preventDefault();
  var form = this;
  var id = document.getElementById('edit-id').value;
  var data = new FormData(form);

  fetch('/admin/api-keys/' + id, { method: 'POST', body: data })
    .then(res => res.json())
    .then(result => {
      if (result.ok) {
        const keyIndex = allApiKeys.findIndex(k => k.id == id);
        if (keyIndex > -1) {
          allApiKeys[keyIndex].name = data.get('name');
          allApiKeys[keyIndex].status = data.get('status');
          allApiKeys[keyIndex].daily_budget_limit = data.get('daily_budget_limit');
          allApiKeys[keyIndex].qps_limit = data.get('qps_limit');
          allApiKeys[keyIndex].allowed_logical_models_json = data.get('allowed_models').split(',').filter(Boolean);
          allApiKeys[keyIndex].request_content_logging_enabled = data.get('request_content_logging_enabled') === 'true';
          allApiKeys[keyIndex].response_content_logging_enabled = data.get('response_content_logging_enabled') === 'true';
        }
        renderTable();
        closeModal('edit-api-key-modal');
        showToast('保存成功');
      } else {
        showToast(result.error || '保存失败', 'error');
      }
    })
    .catch(() => showToast('网络错误，请重试', 'error'));
});

// ---- Topup Modal ----
function openTopupModal(item) {
  document.getElementById('topup-id').value = item.id;
  document.getElementById('topup-api-key-modal').querySelector('h3').textContent = '为 ' + item.name + ' 充值';
  document.getElementById('topup-api-key-form').querySelector('[name="amount"]').value = '10';
  document.getElementById('topup-api-key-form').querySelector('[name="remark"]').value = '';
  openModal('topup-api-key-modal');
}

document.getElementById('topup-api-key-form').addEventListener('submit', function(e) {
  e.preventDefault();
  var form = this;
  var id = document.getElementById('topup-id').value;
  var data = new FormData(form);
  fetch('/admin/api-keys/' + id + '/topup', { method: 'POST', body: data })
    .then(res => {
      if (res.ok || res.redirected) {
        window.location.reload();
      } else {
        showToast('充值失败', 'error');
      }
    })
    .catch(() => showToast('网络错误，请重试', 'error'));
});

// ---- Disable/Enable API Key ----
function disableApiKey(id, name) {
  if (!confirm('确认禁用 ' + name + ' 吗？')) return;
  fetch('/admin/api-keys/' + id + '/delete', { method: 'POST' })
    .then(res => {
      if (res.ok || res.redirected) {
        const keyIndex = allApiKeys.findIndex(k => k.id == id);
        if (keyIndex > -1) allApiKeys[keyIndex].status = 'disabled';
        renderTable();
        showToast(name + ' 已禁用');
      } else {
        showToast('操作失败', 'error');
      }
    })
    .catch(() => showToast('网络错误，请重试', 'error'));
}

function enableApiKey(id, name) {
  if (!confirm('确认启用 ' + name + ' 吗？')) return;
  fetch('/admin/api-keys/' + id + '/enable', { method: 'POST' })
    .then(res => res.json())
    .then(result => {
      if (result.ok) {
        const keyIndex = allApiKeys.findIndex(k => k.id == id);
        if (keyIndex > -1) allApiKeys[keyIndex].status = 'active';
        renderTable();
        showToast(name + ' 已启用');
      } else {
        showToast(result.error || '操作失败', 'error');
      }
    })
    .catch(() => showToast('网络错误，请重试', 'error'));
}

// ---- Init create modal selector ----
document.addEventListener('DOMContentLoaded', function() {
  var createSelector = document.getElementById('model-selector-create');
  if (createSelector) {
    createModelSelector(createSelector, []);
  }
});
</script>
{% endblock %}
