{% extends "base.html" %}
{% block page_content %}

<style>
  .dropdown-items div:active {
    background-color: #f0f9ff; /* sky-50 */
  }
  .selected-tags span {
    transition: all 0.2s;
  }
</style>

<div class="sticky top-0 z-10 -mx-3 lg:-mx-5 -mt-4 lg:-mt-5 mb-4 flex items-center justify-between border-b border-slate-200/70 bg-white/90 px-3 py-2.5 backdrop-blur-sm lg:px-5">
  <div>
    <p class="text-xs uppercase tracking-[0.35em] text-slate-400">API Keys</p>
    <h1 class="mt-0.5 text-xl font-semibold tracking-tight text-slate-900" data-i18n="api_keys.title">API Key 管理</h1>
  </div>
  <button type="button" onclick="openModal('create-api-key-modal')" class="rounded-2xl bg-slate-950 px-4 py-2.5 text-xs font-medium text-white" data-i18n="api_keys.add">新增 API Key</button>
</div>

{% if raw_api_key %}
<div class="mb-4 rounded-2xl border border-emerald-200 bg-emerald-50 px-5 py-3 text-sm text-emerald-800">
  <span data-i18n="api_keys.new_key_notice">新建 API Key 明文，仅展示一次：</span><code class="font-semibold">{{ raw_api_key }}</code>
</div>
{% endif %}

<div class="mb-4 flex flex-wrap gap-2 items-end">
  <div class="min-w-[180px] flex-1">
    <label class="block text-xs text-slate-500 mb-1" data-i18n="common.name">名称</label>
    <input type="text" id="search-name" placeholder="搜索名称..." data-i18n-placeholder="api_keys.search_name" class="w-full rounded-xl border border-slate-200 px-3 py-1.5 text-xs">
  </div>
  <div class="min-w-[150px] flex-1">
    <label class="block text-xs text-slate-500 mb-1" data-i18n="api_keys.col_user">用户 (End User)</label>
    <input type="text" id="search-user" placeholder="搜索用户..." data-i18n-placeholder="api_keys.search_user" class="w-full rounded-xl border border-slate-200 px-3 py-1.5 text-xs">
  </div>
  <div class="shrink-0 w-[130px]">
    <label class="block text-xs text-slate-500 mb-1" data-i18n="common.status">状态</label>
    <select id="search-status" class="w-full rounded-xl border border-slate-200 px-3 py-1.5 text-xs">
      <option value="" data-i18n="common.all">全部</option>
      <option value="active">active</option>
      <option value="disabled">disabled</option>
    </select>
  </div>
  <div class="flex gap-2 shrink-0">
    <button id="search-btn" class="rounded-xl bg-slate-800 px-3 py-1.5 text-xs text-white font-medium hover:bg-slate-700" data-i18n="common.search">搜索</button>
    <button id="reset-btn" class="rounded-xl border border-slate-300 px-3 py-1.5 text-xs text-slate-700 font-medium hover:bg-slate-50" data-i18n="common.reset">重置</button>
  </div>
</div>

<div id="api-keys-table-container" class="overflow-x-auto rounded-2xl bg-white shadow-sm"></div>
<div id="api-keys-pagination-container" class="mt-2 flex items-center justify-between"></div>

<!-- Shared Edit Modal -->
<dialog id="edit-api-key-modal" class="w-full max-w-3xl rounded-2xl p-0 backdrop:bg-slate-950/50">
  <div class="rounded-2xl bg-white p-6">
    <div class="mb-4 flex items-center justify-between border-b border-slate-100 pb-4">
      <h3 class="text-lg font-semibold text-slate-800" data-i18n="api_keys.modal_edit_title">编辑 API Key</h3>
      <button type="button" onclick="closeModal('edit-api-key-modal')" class="rounded-full p-1.5 text-slate-400 hover:bg-slate-100 hover:text-slate-600 transition-colors"><svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd" /></svg></button>
    </div>
    <form id="edit-api-key-form" class="grid gap-4 md:grid-cols-2">
      <input type="hidden" name="id" id="edit-id">
      <label class="block"><span class="mb-1 block text-xs text-slate-600" data-i18n="common.name">名称</span><input name="name" required class="w-full rounded-xl border border-slate-200 px-3 py-2 text-sm"></label>
      <label class="block"><span class="mb-1 block text-xs text-slate-600" data-i18n="common.status">状态</span><select name="status" class="w-full rounded-xl border border-slate-200 px-3 py-2 text-sm"><option value="active">active</option><option value="disabled">disabled</option></select></label>
      <label class="block"><span class="mb-1 block text-xs text-slate-600"><span data-i18n="api_keys.lbl_daily_limit">日限额</span> <span class="text-slate-400" data-i18n="api_keys.lbl_daily_limit_hint">留空不限制</span></span><input name="daily_budget_limit" placeholder="例如 100" class="w-full rounded-xl border border-slate-200 px-3 py-2 text-sm"></label>
      <label class="block"><span class="mb-1 block text-xs text-slate-600" data-i18n="api_keys.lbl_qps">QPS 限制</span><input name="qps_limit" type="number" min="1" class="w-full rounded-xl border border-slate-200 px-3 py-2 text-sm"></label>
      <div class="block md:col-span-2">
        <span class="mb-1 block text-xs text-slate-600" data-i18n="api_keys.lbl_allowed_models">允许访问的逻辑模型</span>
        <div class="model-selector" id="model-selector-edit">
          <div class="selected-tags flex flex-wrap gap-2 mb-2 min-h-[32px]"></div>
          <div class="dropdown-wrapper relative">
            <input type="text" class="model-search w-full rounded-xl border border-slate-200 px-3 py-2 text-sm" placeholder="搜索模型..." data-i18n-placeholder="api_keys.search_model">
            <div class="dropdown hidden absolute bottom-full left-0 right-0 z-10 mb-1 max-h-60 overflow-y-auto rounded-2xl border border-slate-200 bg-white shadow-lg">
              <div class="sticky top-0 flex gap-2 border-b border-slate-100 bg-white px-3 py-2">
                <button type="button" class="select-all text-xs text-sky-600 hover:text-sky-800" data-i18n="common.select_all">全选</button>
                <button type="button" class="clear-all text-xs text-slate-500 hover:text-slate-700" data-i18n="common.clear_all">清空</button>
              </div>
              <div class="dropdown-items"></div>
            </div>
          </div>
          <input type="hidden" name="allowed_models" class="hidden-input" value="">
        </div>
      </div>
      <label class="block"><span class="mb-1 block text-xs text-slate-600" data-i18n="api_keys.lbl_req_logging">记录请求内容</span>
        <select name="request_content_logging_enabled" class="w-full rounded-xl border border-slate-200 px-3 py-2 text-sm">
          <option value="" data-i18n="api_keys.log_default">默认（跟随全局配置）</option>
          <option value="true" data-i18n="api_keys.log_on">开启</option>
          <option value="false" data-i18n="api_keys.log_off">关闭</option>
        </select>
      </label>
      <label class="block"><span class="mb-1 block text-xs text-slate-600" data-i18n="api_keys.lbl_res_logging">记录响应内容</span>
        <select name="response_content_logging_enabled" class="w-full rounded-xl border border-slate-200 px-3 py-2 text-sm">
          <option value="" data-i18n="api_keys.log_default">默认（跟随全局配置）</option>
          <option value="true" data-i18n="api_keys.log_on">开启</option>
          <option value="false" data-i18n="api_keys.log_off">关闭</option>
        </select>
      </label>
      <label class="block md:col-span-2"><span class="mb-1 block text-xs text-slate-600">End User <span class="text-slate-400">（可选，作为此 Key 的默认 x-end-user 值）</span></span><input name="end_user" placeholder="例如 user-123" class="w-full rounded-xl border border-slate-200 px-3 py-2 text-sm"></label>
      <label class="block md:col-span-2"><span class="mb-1 block text-xs text-slate-600">时区 <span class="text-slate-400">（IANA 格式，例如 Asia/Shanghai，留空则不修改）</span></span><input name="timezone" placeholder="例如 Asia/Shanghai" class="w-full rounded-xl border border-slate-200 px-3 py-2 text-sm"></label>
      <label class="block md:col-span-2"><span class="mb-1 block text-xs text-slate-600">默认渠道 (Channel) <span class="text-slate-400">（可选，作为此 Key 的默认 x-channel 值，例如 PERSONAL）</span></span><input name="default_channel" placeholder="例如 PERSONAL" class="w-full rounded-xl border border-slate-200 px-3 py-2 text-sm"></label>
      <button type="submit" class="rounded-xl bg-slate-950 px-4 py-2 text-sm text-white md:col-span-2" data-i18n="common.save">保存</button>
    </form>
  </div>
</dialog>

<!-- Shared Topup Modal -->
<dialog id="topup-api-key-modal" class="w-full max-w-xl rounded-2xl p-0 backdrop:bg-slate-950/50">
  <div class="rounded-2xl bg-white p-6">
    <div class="mb-4 flex items-center justify-between border-b border-slate-100 pb-4">
      <h3 class="text-lg font-semibold text-slate-800" data-i18n="api_keys.modal_topup_title">充值</h3>
      <button type="button" onclick="closeModal('topup-api-key-modal')" class="rounded-full p-1.5 text-slate-400 hover:bg-slate-100 hover:text-slate-600 transition-colors"><svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd" /></svg></button>
    </div>
    <form id="topup-api-key-form" class="grid gap-4">
      <input type="hidden" name="id" id="topup-id">
      <label><span class="mb-1 block text-xs text-slate-600" data-i18n="api_keys.lbl_topup_amount">充值金额</span><input name="amount" type="number" step="0.01" min="0.01" value="10" required class="w-full rounded-xl border border-slate-200 px-3 py-2 text-sm"></label>
      <label><span class="mb-1 block text-xs text-slate-600" data-i18n="api_keys.lbl_remark">备注</span><input name="remark" placeholder="例如 手动充值" class="w-full rounded-xl border border-slate-200 px-3 py-2 text-sm"></label>
      <button type="submit" class="rounded-xl bg-emerald-600 px-4 py-2 text-sm text-white hover:bg-emerald-700" data-i18n="api_keys.btn_confirm_topup">确认充值</button>
    </form>
  </div>
</dialog>

<!-- Create Modal -->
<dialog id="create-api-key-modal" class="w-full max-w-3xl rounded-2xl p-0 backdrop:bg-slate-950/50">
  <div class="rounded-2xl bg-white p-6">
    <div class="mb-4 flex items-center justify-between border-b border-slate-100 pb-4">
      <h3 class="text-lg font-semibold text-slate-800" data-i18n="api_keys.modal_create_title">创建 API Key</h3>
      <button type="button" onclick="closeModal('create-api-key-modal')" class="rounded-full p-1.5 text-slate-400 hover:bg-slate-100 hover:text-slate-600 transition-colors"><svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd" /></svg></button>
    </div>
    <form method="post" action="/admin/api-keys" class="grid gap-4 md:grid-cols-2" id="create-api-key-form">
      <label><span class="mb-1 block text-xs text-slate-600" data-i18n="common.name">名称</span><input name="name" required class="w-full rounded-xl border border-slate-200 px-3 py-2 text-sm"></label>
      <label><span class="mb-1 block text-xs text-slate-600" data-i18n="api_keys.lbl_initial_balance">初始余额</span><input name="balance" type="number" step="0.01" min="0" value="0" class="w-full rounded-xl border border-slate-200 px-3 py-2 text-sm"></label>
      <label><span class="mb-1 block text-xs text-slate-600">日限额 <span class="text-slate-400">留空不限制</span></span><input name="daily_budget_limit" placeholder="例如 100" class="w-full rounded-xl border border-slate-200 px-3 py-2 text-sm"></label>
      <label><span class="mb-1 block text-xs text-slate-600">QPS 限制</span><input name="qps_limit" type="number" min="1" value="5" class="w-full rounded-xl border border-slate-200 px-3 py-2 text-sm"></label>
      <div class="block md:col-span-2">
        <span class="mb-1 block text-xs text-slate-600">允许访问的逻辑模型</span>
        <div class="model-selector" id="model-selector-create">
          <div class="selected-tags flex flex-wrap gap-2 mb-2 min-h-[32px]"></div>
          <div class="dropdown-wrapper relative">
            <input type="text" class="model-search w-full rounded-xl border border-slate-200 px-3 py-2 text-sm" placeholder="搜索模型...">
            <div class="dropdown hidden absolute bottom-full left-0 right-0 z-10 mb-1 max-h-60 overflow-y-auto rounded-2xl border border-slate-200 bg-white shadow-lg">
              <div class="sticky top-0 flex gap-2 border-b border-slate-100 bg-white px-3 py-2">
                <button type="button" class="select-all text-xs text-sky-600 hover:text-sky-800">全选</button>
                <button type="button" class="clear-all text-xs text-slate-500 hover:text-slate-700">清空</button>
              </div>
              <div class="dropdown-items"></div>
            </div>
          </div>
          <input type="hidden" name="allowed_models" class="hidden-input" value="">
        </div>
      </div>
      <label class="block md:col-span-2"><span class="mb-1 block text-xs text-slate-600">End User <span class="text-slate-400">（可选，作为此 Key 的默认 x-end-user 值）</span></span><input name="end_user" placeholder="例如 user-123" class="w-full rounded-xl border border-slate-200 px-3 py-2 text-sm"></label>
      <label class="block md:col-span-2"><span class="mb-1 block text-xs text-slate-600">时区 <span class="text-slate-400">（IANA 格式，留空使用系统默认值 {{ default_tz }}）</span></span><input name="timezone" placeholder="例如 Asia/Shanghai" class="w-full rounded-xl border border-slate-200 px-3 py-2 text-sm"></label>
      <label class="block md:col-span-2"><span class="mb-1 block text-xs text-slate-600">默认渠道 (Channel) <span class="text-slate-400">（可选，作为此 Key 的默认 x-channel 值，例如 PERSONAL）</span></span><input name="default_channel" placeholder="例如 PERSONAL" class="w-full rounded-xl border border-slate-200 px-3 py-2 text-sm"></label>
      <button type="submit" class="rounded-xl bg-slate-950 px-4 py-2 text-sm text-white md:col-span-2" data-i18n="api_keys.btn_create">创建 API Key</button>
    </form>
  </div>
</dialog>

<!-- Reveal Key Modal -->
<dialog id="reveal-key-modal" class="w-full max-w-xl rounded-2xl p-0 backdrop:bg-slate-950/50">
  <div class="rounded-2xl bg-white p-6">
    <div class="mb-4 flex items-center justify-between border-b border-slate-100 pb-4">
      <h3 class="text-lg font-semibold text-slate-800" data-i18n="api_keys.modal_reveal_title">查看 API Key</h3>
      <button type="button" onclick="closeModal('reveal-key-modal')" class="rounded-full p-1.5 text-slate-400 hover:bg-slate-100 hover:text-slate-600 transition-colors"><svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd" /></svg></button>
    </div>
    <div class="mb-2 text-xs text-slate-500" data-i18n="api_keys.reveal_notice">请注意保持此 Key 的机密，不要泄露给无关人员。</div>
    <div class="flex items-center gap-2 rounded-xl border border-slate-200 bg-slate-50 px-4 py-3">
      <code id="reveal-key-value" class="flex-1 break-all text-sm font-semibold text-slate-800 select-all"></code>
      <button type="button" onclick="copyRevealedKey()" class="shrink-0 rounded-lg border border-slate-200 px-3 py-1.5 text-xs hover:bg-slate-100" data-i18n="api_keys.btn_copy_key">复制</button>
    </div>
  </div>
</dialog>

<script>
let allApiKeys = {{ api_keys|tojson }};
let currentPage = 1;
const rowsPerPage = 10;

function getFilters() {
  return {
    name: document.getElementById('search-name').value.trim().toLowerCase(),
    status: document.getElementById('search-status').value,
    user: document.getElementById('search-user').value.trim().toLowerCase(),
  };
}

function renderTable() {
  const { name, status, user } = getFilters();
  const filteredKeys = allApiKeys.filter(key => {
    if (name && !key.name.toLowerCase().includes(name)) return false;
    if (status && key.status !== status) return false;
    if (user && !(key.end_user || '').toLowerCase().includes(user)) return false;
    return true;
  });

  const tableContainer = document.getElementById('api-keys-table-container');
  const paginationContainer = document.getElementById('api-keys-pagination-container');
  tableContainer.innerHTML = '';
  paginationContainer.innerHTML = '';

  if (filteredKeys.length === 0) {
    tableContainer.innerHTML = '<p class="text-center text-slate-500 p-4">' + t('api_keys.no_data') + '</p>';
    return;
  }

  const totalPages = Math.ceil(filteredKeys.length / rowsPerPage);
  const paginatedKeys = filteredKeys.slice((currentPage - 1) * rowsPerPage, currentPage * rowsPerPage);

  const table = document.createElement('table');
  table.className = 'w-full text-sm text-left text-slate-500';
  table.innerHTML = `
    <thead class="text-xs text-slate-700 uppercase bg-slate-50">
      <tr>
        <th scope="col" class="px-2 py-3 whitespace-nowrap">${t('common.name')}</th>
        <th scope="col" class="px-2 py-3 whitespace-nowrap">${t('api_keys.col_user')}</th>
        <th scope="col" class="px-2 py-3 whitespace-nowrap">${t('common.status')}</th>
        <th scope="col" class="px-2 py-3 whitespace-nowrap">${t('api_keys.col_balance')}</th>
        <th scope="col" class="px-2 py-3 whitespace-nowrap">${t('api_keys.col_daily_spend')}</th>
        <th scope="col" class="px-2 py-3 whitespace-nowrap">QPS</th>
        <th scope="col" class="px-2 py-3 whitespace-nowrap">${t('common.actions')}</th>
      </tr>
    </thead>
    <tbody>
    </tbody>
  `;
  const tbody = table.querySelector('tbody');
  paginatedKeys.forEach(item => {
    const tr = document.createElement('tr');
    tr.className = 'bg-white border-b';
    tr.innerHTML = `
      <td class="px-2 py-2 text-xs font-medium text-slate-900 whitespace-nowrap">${item.name}</td>
      <td class="px-2 py-2 text-xs whitespace-nowrap text-slate-500">${item.end_user || '<span class="text-slate-300">—</span>'}</td>
      <td class="px-2 py-2 text-xs whitespace-nowrap">${item.status === 'active' ? '<span class="inline-flex items-center rounded-full bg-emerald-50 px-2.5 py-0.5 text-xs font-medium text-emerald-700">active</span>' : '<span class="inline-flex items-center rounded-full bg-rose-50 px-2.5 py-0.5 text-xs font-medium text-rose-700">disabled</span>'}</td>
      <td class="px-2 py-2 text-xs whitespace-nowrap">${item.balance}</td>
      <td class="px-2 py-2 text-xs whitespace-nowrap">${item.daily_spend_amount}</td>
      <td class="px-2 py-2 text-xs whitespace-nowrap">${item.qps_limit}</td>
      <td class="px-2 py-2 whitespace-nowrap"><div class="flex gap-2">
        <button type="button" onclick='openEditModal(${JSON.stringify(item)})' class="rounded-lg border border-slate-200 px-3 py-1.5 text-xs">${t('common.edit')}</button>
        <button type="button" onclick='openTopupModal(${JSON.stringify(item)})' class="rounded-lg border border-emerald-200 bg-emerald-50 px-3 py-1.5 text-xs text-emerald-700">${t('api_keys.btn_topup')}</button>
        ${item.has_key ? `<button type="button" onclick="revealKey(${item.id})" class="rounded-lg border border-sky-200 bg-sky-50 px-3 py-1.5 text-xs text-sky-700">${t('api_keys.btn_reveal')}</button>` : ''}
        ${item.status === 'active' ? `<button type="button" onclick="disableApiKey(${item.id}, '${item.name}')" class="rounded-lg border border-rose-200 bg-rose-50 px-3 py-1.5 text-xs text-rose-700">${t('common.disable')}</button>` : `<button type="button" onclick="enableApiKey(${item.id}, '${item.name}')" class="rounded-lg border border-emerald-200 bg-emerald-50 px-3 py-1.5 text-xs text-emerald-700">${t('common.enable')}</button>`}
        <button type="button" onclick="destroyApiKey(${item.id}, '${item.name}')" class="rounded-lg border border-rose-300 bg-rose-100 px-3 py-1.5 text-xs text-rose-800">${t('common.delete')}</button>
      </div></td>
    `;
    tbody.appendChild(tr);
  });
  tableContainer.appendChild(table);

  // Pagination
  const paginDiv = document.createElement('div');
  paginDiv.className = 'flex items-center gap-2';

  const prevButton = document.createElement('button');
  prevButton.textContent = t('common.prev_page');
  prevButton.className = 'rounded-lg border px-3 py-1.5 text-xs' + (currentPage === 1 ? ' text-slate-400' : '');
  prevButton.disabled = currentPage === 1;
  prevButton.onclick = () => { currentPage--; renderTable(); };
  paginDiv.appendChild(prevButton);

  const pageInfo = document.createElement('span');
  pageInfo.textContent = t('common.page_info').replace('{cur}', currentPage).replace('{total}', totalPages);
  pageInfo.className = 'text-xs text-slate-500';
  paginDiv.appendChild(pageInfo);

  const nextButton = document.createElement('button');
  nextButton.textContent = t('common.next_page');
  nextButton.className = 'rounded-lg border px-3 py-1.5 text-xs' + (currentPage === totalPages ? ' text-slate-400' : '');
  nextButton.disabled = currentPage === totalPages;
  nextButton.onclick = () => { currentPage++; renderTable(); };
  paginDiv.appendChild(nextButton);

  paginationContainer.appendChild(paginDiv);
}

  currentPage = 1;
  renderTable();
});

document.getElementById('search-user').addEventListener('keydown', (e) => {

window.i18n && window.i18n.onLangChange(renderTable);

var logicalModels = {{ logical_models|tojson }};

// ===== Model Selector v3（ID-based）=====
function createModelSelector(selector, initialSelected) {
  if (selector._inited) return;

  // initialSelected is an array of IDs (numbers)
  const state = {
    selected: (Array.isArray(initialSelected) ? [...initialSelected] : []).map(Number).filter(n => !isNaN(n)),
    all: logicalModels  // [{id, name, description}, ...]
  };

  const els = {
    dropdown: selector.querySelector('.dropdown'),
    items: selector.querySelector('.dropdown-items'),
    search: selector.querySelector('.model-search'),
    tags: selector.querySelector('.selected-tags'),
    hidden: selector.querySelector('.hidden-input'),
    selectAll: selector.querySelector('.select-all'),
    clearAll: selector.querySelector('.clear-all')
  };

  selector._state = state;
  selector._els = els;

  function displayLabel(model) {
    return model.description ? `${model.name} <span class="text-slate-400">(${model.description})</span>` : model.name;
  }

  function displayLabelPlain(model) {
    return model.description ? `${model.name} (${model.description})` : model.name;
  }

  function renderTags() {
    els.tags.innerHTML = '';
    state.selected.forEach(id => {
      const model = state.all.find(m => m.id === id);
      if (!model) return;
      const tag = document.createElement('span');
      tag.className = 'inline-flex items-center gap-1 rounded-full bg-slate-100 text-slate-700 border border-slate-200 px-3 py-1 text-sm cursor-default';

      const labelSpan = document.createElement('span');
      labelSpan.innerHTML = displayLabel(model);
      const button = document.createElement('button');
      button.type = 'button';
      button.className = 'delete-btn ml-1 text-slate-400 hover:text-rose-500 transition-colors font-bold text-lg leading-none';
      button.textContent = '×';
      button.addEventListener('click', (e) => {
        e.preventDefault();
        e.stopPropagation();
        state.selected = state.selected.filter(n => n !== id);
        sync();
      });

      tag.appendChild(labelSpan);
      tag.appendChild(button);
      els.tags.appendChild(tag);
    });
  }

  function renderDropdown() {
    const keyword = els.search.value.toLowerCase();
    els.items.innerHTML = '';
    const list = state.all.filter(m =>
      m.name.toLowerCase().includes(keyword) ||
      (m.description || '').toLowerCase().includes(keyword)
    );

    if (!list.length) {
      els.items.innerHTML = '<div class="px-4 py-2 text-slate-400">' + t('api_keys.no_match_model') + '</div>';
      return;
    }

    list.forEach(model => {
      const isSelected = state.selected.includes(model.id);
      const item = document.createElement('div');
      item.className = `cursor-pointer px-4 py-2.5 flex justify-between items-center hover:bg-slate-50 transition-colors ${isSelected ? 'bg-sky-50/50 text-sky-700' : 'text-slate-700'}`;
      item.innerHTML = `<span>${displayLabel(model)}</span>${isSelected ? '<span class="font-bold">✓</span>' : ''}`;

      item.onclick = (e) => {
        e.preventDefault();
        e.stopPropagation();
        if (isSelected) {
          state.selected = state.selected.filter(n => n !== model.id);
        } else {
          state.selected.push(model.id);
        }
        sync();
      };
      els.items.appendChild(item);
    });
  }

  function sync() {
    els.hidden.value = state.selected.join(',');
    renderTags();
    renderDropdown();
  }

  selector._sync = sync;

  // 搜索框事件
  els.search.onfocus = () => {
    els.dropdown.classList.remove('hidden');
    renderDropdown();
  };

  els.search.oninput = renderDropdown;

  // 全选/清空
  els.selectAll.onclick = (e) => {
    e.preventDefault();
    e.stopPropagation();
    const keyword = els.search.value.toLowerCase();
    const visible = state.all.filter(m =>
      m.name.toLowerCase().includes(keyword) ||
      (m.description || '').toLowerCase().includes(keyword)
    );
    state.selected = Array.from(new Set([...state.selected, ...visible.map(m => m.id)]));
    sync();
  };

  els.clearAll.onclick = (e) => {
    e.preventDefault();
    e.stopPropagation();
    state.selected = [];
    sync();
  };

  // 点击外部关闭
  const closeDropdown = (e) => {
    if (!selector.contains(e.target)) {
      els.dropdown.classList.add('hidden');
    }
  };
  document.addEventListener('click', closeDropdown);

  sync();
  selector._inited = true;
}

// ===== Edit Modal（稳定版）=====
function openEditModal(item) {
  const selector = document.getElementById('model-selector-edit');

  document.getElementById('edit-id').value = item.id;
  const form = document.getElementById('edit-api-key-form');
  form.querySelector('[name="name"]').value = item.name;
  form.querySelector('[name="status"]').value = item.status;
  form.querySelector('[name="daily_budget_limit"]').value = item.daily_budget_limit || '';
  form.querySelector('[name="qps_limit"]').value = item.qps_limit;
  const reqVal = item.request_content_logging_enabled === true ? 'true' : (item.request_content_logging_enabled === false ? 'false' : '');
  const resVal = item.response_content_logging_enabled === true ? 'true' : (item.response_content_logging_enabled === false ? 'false' : '');
  form.querySelector('[name="request_content_logging_enabled"]').value = reqVal;
  form.querySelector('[name="response_content_logging_enabled"]').value = resVal;
  form.querySelector('[name="end_user"]').value = item.end_user || '';
  form.querySelector('[name="timezone"]').value = item.timezone || '';
  form.querySelector('[name="default_channel"]').value = item.default_channel || '';

  // allowed_logical_models_json now contains IDs (numbers)
  const models = (item.allowed_logical_models_json || []).map(Number).filter(n => !isNaN(n));

  if (!selector._inited) {
    createModelSelector(selector, models);
  } else {
    selector._state.selected = [...models];
    selector._els.search.value = '';
    selector._sync();
  }

  openModal('edit-api-key-modal');
}

// ---- Edit Modal Submit ----
document.getElementById('edit-api-key-form').addEventListener('submit', function(e) {
  e.preventDefault();
  var form = this;
  var id = document.getElementById('edit-id').value;
  var data = new FormData(form);

  fetch('/admin/api-keys/' + id, { method: 'POST', body: data })
    .then(res => res.json())
    .then(result => {
      if (result.ok) {
        const keyIndex = allApiKeys.findIndex(k => k.id == id);
        if (keyIndex > -1) {
          allApiKeys[keyIndex].name = data.get('name');
          allApiKeys[keyIndex].status = data.get('status');
          allApiKeys[keyIndex].daily_budget_limit = data.get('daily_budget_limit');
          allApiKeys[keyIndex].qps_limit = data.get('qps_limit');
          allApiKeys[keyIndex].allowed_logical_models_json = data.get('allowed_models').split(',').filter(Boolean).map(Number).filter(n => !isNaN(n));
          const rv = data.get('request_content_logging_enabled');
          const resv = data.get('response_content_logging_enabled');
          allApiKeys[keyIndex].request_content_logging_enabled = rv === 'true' ? true : (rv === 'false' ? false : null);
          allApiKeys[keyIndex].response_content_logging_enabled = resv === 'true' ? true : (resv === 'false' ? false : null);
          allApiKeys[keyIndex].end_user = data.get('end_user') || '';
          const tz = data.get('timezone');
          if (tz) allApiKeys[keyIndex].timezone = tz;
          allApiKeys[keyIndex].default_channel = data.get('default_channel') || '';
        }
        renderTable();
        closeModal('edit-api-key-modal');
        showToast(t('api_keys.toast_saved'));
      } else {
        showToast(result.error || t('common.save_fail'), 'error');
      }
    })
    .catch(() => showToast(t('common.network_error'), 'error'));
});

// ---- Topup Modal ----
function openTopupModal(item) {
  document.getElementById('topup-id').value = item.id;
  document.getElementById('topup-api-key-modal').querySelector('h3').textContent = t('api_keys.modal_topup_title') + ' — ' + item.name;
  document.getElementById('topup-api-key-form').querySelector('[name="amount"]').value = '10';
  document.getElementById('topup-api-key-form').querySelector('[name="remark"]').value = '';
  openModal('topup-api-key-modal');
}

document.getElementById('topup-api-key-form').addEventListener('submit', function(e) {
  e.preventDefault();
  var form = this;
  var id = document.getElementById('topup-id').value;
  var data = new FormData(form);
  fetch('/admin/api-keys/' + id + '/topup', { method: 'POST', body: data })
    .then(res => {
      if (res.ok || res.redirected) {
        window.location.reload();
      } else {
        showToast(t('api_keys.toast_topup_fail'), 'error');
      }
    })
    .catch(() => showToast(t('common.network_error'), 'error'));
});

// ---- Disable/Enable API Key ----
function disableApiKey(id, name) {
  if (!confirm(t('api_keys.confirm_disable').replace('{name}', name))) return;
  fetch('/admin/api-keys/' + id + '/delete', { method: 'POST' })
    .then(res => {
      if (res.ok || res.redirected) {
        const keyIndex = allApiKeys.findIndex(k => k.id == id);
        if (keyIndex > -1) allApiKeys[keyIndex].status = 'disabled';
        renderTable();
        showToast(t('api_keys.toast_disabled').replace('{name}', name));
      } else {
        showToast(t('common.op_fail'), 'error');
      }
    })
    .catch(() => showToast(t('common.network_error'), 'error'));
}

function enableApiKey(id, name) {
  if (!confirm(t('api_keys.confirm_enable').replace('{name}', name))) return;
  fetch('/admin/api-keys/' + id + '/enable', { method: 'POST' })
    .then(res => res.json())
    .then(result => {
      if (result.ok) {
        const keyIndex = allApiKeys.findIndex(k => k.id == id);
        if (keyIndex > -1) allApiKeys[keyIndex].status = 'active';
        renderTable();
        showToast(t('api_keys.toast_enabled').replace('{name}', name));
      } else {
        showToast(result.error || t('common.op_fail'), 'error');
      }
    })
    .catch(() => showToast(t('common.network_error'), 'error'));
}

// ---- Destroy (hard delete) API Key ----
function destroyApiKey(id, name) {
  if (!confirm(t('api_keys.confirm_delete').replace('{name}', name))) return;
  fetch('/admin/api-keys/' + id + '/destroy', { method: 'POST' })
    .then(res => res.json())
    .then(result => {
      if (result.ok) {
        allApiKeys = allApiKeys.filter(k => k.id != id);
        const totalPages = Math.ceil(allApiKeys.length / rowsPerPage);
        if (currentPage > 1 && currentPage > totalPages) currentPage = Math.max(1, totalPages);
        renderTable();
        showToast(t('api_keys.toast_deleted').replace('{name}', name));
      } else {
        showToast(result.error || t('common.delete_fail'), 'error');
      }
    })
    .catch(() => showToast(t('common.network_error'), 'error'));
}

// ---- Reveal API Key ----
function revealKey(id) {
  const modal = document.getElementById('reveal-key-modal');
  const display = document.getElementById('reveal-key-value');
  display.textContent = t('common.loading');
  openModal('reveal-key-modal');
  fetch('/admin/api-keys/' + id + '/reveal')
    .then(res => res.json())
    .then(result => {
      if (result.ok) {
        display.textContent = result.key;
      } else {
        display.textContent = result.error || t('common.op_fail');
      }
    })
    .catch(() => { display.textContent = t('common.network_error'); });
}

function copyRevealedKey() {
  const text = document.getElementById('reveal-key-value').textContent;
  if (!text || text === '载入中...') return;
  const modal = document.getElementById('reveal-key-modal');
  copyText(text, function() {
    showToast(t('api_keys.toast_copied'));
  }, function() {
    showToast(t('api_keys.toast_copy_fail'), 'error');
  }, {
    container: modal || document.body
  });
}

// ---- Init create modal selector ----
document.addEventListener('DOMContentLoaded', function() {
  var createSelector = document.getElementById('model-selector-create');
  if (createSelector) {
    createModelSelector(createSelector, []);
  }
});
