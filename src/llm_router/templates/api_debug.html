{% extends "base.html" %}

{% block page_content %}
<div class="sticky top-0 z-10 -mx-3 lg:-mx-5 -mt-4 lg:-mt-5 mb-6 border-b border-slate-200/70 bg-white/90 px-3 py-2.5 backdrop-blur-sm lg:px-5">
  <p class="text-xs uppercase tracking-[0.35em] text-slate-400">Playground</p>
  <h1 class="mt-0.5 text-xl font-semibold tracking-tight text-slate-900">API Playground</h1>
</div>

<div class="grid grid-cols-1 lg:grid-cols-2 gap-5">

  <!-- Left: Request Configuration -->
  <section class="rounded-2xl bg-white shadow-sm p-4 lg:p-5">
    <h2 class="text-sm font-semibold text-slate-800 mb-4">请求配置</h2>

    <form id="debug-form">
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 mb-4">
        <!-- API Type -->
        <div>
          <label for="api-type" class="block text-xs text-slate-500 mb-1">API 类型</label>
          <select id="api-type" name="api_type" class="w-full rounded-xl border border-slate-200 px-3 py-1.5 text-xs" required>
            <option value="openai_chat">OpenAI Chat Completions</option>
            <option value="anthropic_chat">Anthropic Chat Completions</option>
          </select>
        </div>

        <!-- API Key -->
        <div>
          <label for="api-key" class="block text-xs text-slate-500 mb-1">API Key</label>
          <select id="api-key" name="api_key_id" class="w-full rounded-xl border border-slate-200 px-3 py-1.5 text-xs" required>
            {% for api_key in api_keys %}
            <option value="{{ api_key.id }}">{{ api_key.name }}</option>
            {% endfor %}
          </select>
        </div>
      </div>

      <!-- Payload Editor -->
      <div class="mb-4">
        <label for="payload" class="block text-xs text-slate-500 mb-1">请求报文 (JSON)</label>
        <textarea id="payload" name="payload" rows="16"
          class="w-full rounded-xl border border-slate-200 px-3 py-2 text-xs font-mono bg-slate-50 focus:bg-white focus:outline-none focus:ring-1 focus:ring-slate-400 transition resize-y"
          required>{{ default_openai_payload }}</textarea>
      </div>

      <!-- Action Buttons -->
      <div class="flex gap-2">
        <button type="submit" id="send-btn"
          class="flex-1 rounded-xl bg-slate-800 px-4 py-2 text-xs text-white font-medium hover:bg-slate-700 transition disabled:opacity-50 disabled:cursor-not-allowed">
          发送请求
        </button>
        <button type="button" id="clear-btn"
          class="rounded-xl border border-slate-300 px-4 py-2 text-xs text-slate-700 font-medium hover:bg-slate-50 transition">
          清空
        </button>
      </div>
    </form>
  </section>

  <!-- Right: Response Display -->
  <section class="rounded-2xl bg-white shadow-sm p-4 lg:p-5 flex flex-col">
    <div class="flex items-center justify-between mb-4">
      <h2 class="text-sm font-semibold text-slate-800">响应报文</h2>
      <div class="flex items-center gap-3">
        <span class="text-xs text-slate-500">耗时:
          <span id="response-time" class="font-medium text-slate-700">--</span>
        </span>
        <span id="response-status"
          class="inline-flex items-center rounded-full bg-slate-100 px-2.5 py-0.5 text-xs font-medium text-slate-600">
          未发送
        </span>
      </div>
    </div>

    <!-- Response Body -->
    <div class="flex-1 rounded-xl border border-slate-200 bg-slate-50 overflow-auto" style="min-height: 24rem;">
      <pre id="response-body"
        class="p-3 text-xs font-mono text-slate-700 whitespace-pre-wrap break-all">等待发送请求...</pre>
    </div>
  </section>

</div>

<script>
  const apiTypeSelect = document.getElementById('api-type');
  const payloadTextarea = document.getElementById('payload');
  const defaultPayloads = {
    openai_chat: JSON.stringify({{ default_openai_payload | tojson }}, null, 2),
    anthropic_chat: JSON.stringify({{ default_anthropic_payload | tojson }}, null, 2)
  };

  apiTypeSelect.addEventListener('change', () => {
    payloadTextarea.value = defaultPayloads[apiTypeSelect.value];
  });

  const debugForm = document.getElementById('debug-form');
  const sendBtn = document.getElementById('send-btn');
  const clearBtn = document.getElementById('clear-btn');
  const responseStatus = document.getElementById('response-status');
  const responseTime = document.getElementById('response-time');
  const responseBody = document.getElementById('response-body');

  function setStatus(text, color) {
    const map = {
      slate:   'bg-slate-100 text-slate-600',
      blue:    'bg-blue-50 text-blue-700',
      emerald: 'bg-emerald-50 text-emerald-700',
      rose:    'bg-rose-50 text-rose-700',
    };
    responseStatus.className = 'inline-flex items-center rounded-full px-2.5 py-0.5 text-xs font-medium ' + (map[color] || map.slate);
    responseStatus.textContent = text;
  }

  debugForm.addEventListener('submit', async (e) => {
    e.preventDefault();

    responseBody.textContent = '发送中...';
    setStatus('发送中', 'blue');
    responseTime.textContent = '--';
    sendBtn.disabled = true;
    sendBtn.textContent = '发送中...';

    const startTime = Date.now();

    try {
      const formData = new FormData(debugForm);
      const payload = formData.get('payload');

      try {
        JSON.parse(payload);
      } catch {
        throw new Error('JSON 格式有误，请检查请求报文');
      }

      const response = await fetch('/admin/api-debug/execute', {
        method: 'POST',
        body: formData,
        headers: { 'X-Requested-With': 'XMLHttpRequest' }
      });

      const elapsed = Date.now() - startTime;
      responseTime.textContent = `${elapsed}ms`;

      if (response.headers.get('content-type')?.includes('text/event-stream')) {
        setStatus('流式响应', 'emerald');
        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        responseBody.textContent = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          const chunk = decoder.decode(value, { stream: true });
          responseBody.textContent += formatStreamingChunk(chunk);
          responseBody.parentElement.scrollTop = responseBody.parentElement.scrollHeight;
        }
      } else {
        const data = await response.json();
        if (response.ok) {
          setStatus('成功 ' + response.status, 'emerald');
        } else {
          setStatus('失败 ' + response.status, 'rose');
        }
        responseBody.textContent = JSON.stringify(data, null, 2);
      }
    } catch (error) {
      responseTime.textContent = `${Date.now() - startTime}ms`;
      setStatus('错误', 'rose');
      responseBody.textContent = '错误: ' + error.message;
    } finally {
      sendBtn.disabled = false;
      sendBtn.textContent = '发送请求';
    }
  });

  clearBtn.addEventListener('click', () => {
    responseBody.textContent = '等待发送请求...';
    setStatus('未发送', 'slate');
    responseTime.textContent = '--';
  });

  function formatStreamingChunk(chunk) {
    let result = '';
    for (const line of chunk.split('\n')) {
      if (!line.startsWith('data: ')) continue;
      const data = line.slice(6);
      if (data === '[DONE]') continue;
      try {
        result += JSON.stringify(JSON.parse(data), null, 2) + '\n';
      } catch {
        result += data + '\n';
      }
    }
    return result;
  }
</script>
{% endblock %}
