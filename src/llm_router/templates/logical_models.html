{% extends "base.html" %}
{% block page_content %}
<div class="sticky top-0 z-10 -mx-3 lg:-mx-5 -mt-4 lg:-mt-5 mb-4 flex items-center justify-between border-b border-slate-200/70 bg-white/90 px-3 py-2.5 backdrop-blur-sm lg:px-5">
  <div>
    <p class="text-xs uppercase tracking-[0.35em] text-slate-400">Logical Models</p>
    <h1 class="mt-0.5 text-xl font-semibold tracking-tight text-slate-900">逻辑模型</h1>
  </div>
  <button type="button" onclick="openModal('create-logical-model-modal')" class="rounded-2xl bg-slate-950 px-4 py-2.5 text-xs font-medium text-white">新增逻辑模型</button>
</div>

<div class="mb-4 flex flex-wrap gap-2 items-end">
  <div class="min-w-[180px] flex-1">
    <label class="block text-xs text-slate-500 mb-1">名称</label>
    <input type="text" id="search-name" placeholder="搜索名称..." class="w-full rounded-xl border border-slate-200 px-3 py-1.5 text-xs">
  </div>
  <div class="shrink-0 w-[130px]">
    <label class="block text-xs text-slate-500 mb-1">状态</label>
    <select id="search-status" class="w-full rounded-xl border border-slate-200 px-3 py-1.5 text-xs">
      <option value="">全部</option>
      <option value="active">active</option>
      <option value="disabled">disabled</option>
    </select>
  </div>
  <div class="flex gap-2 shrink-0">
    <button id="search-btn" class="rounded-xl bg-slate-800 px-3 py-1.5 text-xs text-white font-medium hover:bg-slate-700">搜索</button>
    <button id="reset-btn" class="rounded-xl border border-slate-300 px-3 py-1.5 text-xs text-slate-700 font-medium hover:bg-slate-50">重置</button>
  </div>
</div>

<div id="logical-models-table-container" class="overflow-x-auto rounded-2xl bg-white shadow-sm"></div>
<div id="logical-models-pagination-container" class="mt-2 flex items-center justify-between"></div>

{% for item in logical_models %}
<dialog id="edit-logical-model-modal-{{ item.id }}" class="w-full max-w-2xl rounded-2xl p-0 backdrop:bg-slate-950/50">
  <div class="rounded-2xl bg-white p-6">
    <div class="mb-4 flex items-center justify-between border-b border-slate-100 pb-4"><h3 class="text-lg font-semibold text-slate-800">编辑逻辑模型</h3><button type="button" onclick='closeModal("edit-logical-model-modal-{{ item.id }}")' class="rounded-full p-1.5 text-slate-400 hover:bg-slate-100 hover:text-slate-600 transition-colors"><svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd" /></svg></button></div>
    <form id="edit-logical-model-form-{{ item.id }}" method="post" action="/admin/logical-models/{{ item.id }}" class="grid gap-4">
      <label><span class="mb-1 block text-xs text-slate-600">模型名称</span><input name="name" class="w-full rounded-xl border border-slate-200 px-3 py-2 text-sm"></label>
      <label><span class="mb-1 block text-xs text-slate-600">描述</span><input name="description" class="w-full rounded-xl border border-slate-200 px-3 py-2 text-sm"></label>
      <label class="flex items-center gap-2 rounded-xl border border-slate-200 px-3 py-2 text-xs text-slate-600"><input type="checkbox" name="is_active" value="true">启用</label>
      <button type="submit" class="rounded-xl bg-slate-950 px-4 py-2 text-sm text-white">保存</button>
    </form>
  </div>
</dialog>
{% endfor %}

<dialog id="create-logical-model-modal" class="w-full max-w-2xl rounded-2xl p-0 backdrop:bg-slate-950/50">
  <div class="rounded-2xl bg-white p-6">
    <div class="mb-4 flex items-center justify-between border-b border-slate-100 pb-4"><h3 class="text-lg font-semibold text-slate-800">创建逻辑模型</h3><button type="button" onclick='closeModal("create-logical-model-modal")' class="rounded-full p-1.5 text-slate-400 hover:bg-slate-100 hover:text-slate-600 transition-colors"><svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd" /></svg></button></div>
    <form method="post" action="/admin/logical-models" class="grid gap-4">
      <label><span class="mb-1 block text-xs text-slate-600">模型名称</span><input name="name" class="w-full rounded-xl border border-slate-200 px-3 py-2 text-sm" required></label>
      <label><span class="mb-1 block text-xs text-slate-600">描述</span><input name="description" class="w-full rounded-xl border border-slate-200 px-3 py-2 text-sm"></label>
      <button type="submit" class="rounded-xl bg-sky-600 px-4 py-2 text-sm text-white">创建</button>
    </form>
  </div>
</dialog>
<dialog id="routes-modal" class="w-full max-w-5xl rounded-2xl p-0 backdrop:bg-slate-950/50">
  <div class="rounded-2xl bg-white p-6">
    <div class="mb-4 flex items-center justify-between border-b border-slate-100 pb-4"><h3 class="text-lg font-semibold text-slate-800">路由规则</h3><button type="button" onclick='closeModal("routes-modal")' class="rounded-full p-1.5 text-slate-400 hover:bg-slate-100 hover:text-slate-600 transition-colors"><svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd" /></svg></button></div>
    <div class="mb-4 flex items-center justify-between">
      <div class="flex items-center gap-2">
        <input type="text" id="routes-search" placeholder="搜索..." class="w-full rounded-xl border border-slate-200 px-3 py-1.5 text-xs">
      </div>
      <button type="button" onclick="openCreateRouteModal()" class="rounded-2xl bg-slate-950 px-4 py-2.5 text-xs font-medium text-white">新增路由</button>
    </div>
    <div id="routes-table-container" class="overflow-x-auto rounded-2xl bg-white shadow-sm"></div>
    <div id="routes-pagination-container" class="mt-2 flex items-center justify-between"></div>
  </div>
</dialog>
<dialog id="create-route-modal" class="w-full max-w-3xl rounded-2xl p-0 backdrop:bg-slate-950/50">
  <div class="rounded-2xl bg-white p-6">
    <div class="mb-4 flex items-center justify-between border-b border-slate-100 pb-4"><h3 class="text-lg font-semibold text-slate-800">新增路由</h3><button type="button" onclick='closeModal("create-route-modal")' class="rounded-full p-1.5 text-slate-400 hover:bg-slate-100 hover:text-slate-600 transition-colors"><svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd" /></svg></button></div>
    <form id="create-route-form" method="post" action="/admin/routes" class="grid gap-4 md:grid-cols-2">
      <input type="hidden" name="logical_model_id">
      <label><span class="mb-1 block text-xs text-slate-600">Provider</span><select name="provider_model_id" class="w-full rounded-xl border border-slate-200 px-3 py-2 text-sm">{% for item in provider_models %}<option value="{{ item.id }}">{{ item.name }}{% if item.description %} <span class="text-slate-400">({{ item.description }})</span>{% endif %}</option>{% endfor %}</select></label>
      <label><span class="mb-1 block text-xs text-slate-600">优先级</span><input name="priority" value="100" class="w-full rounded-xl border border-slate-200 px-3 py-2 text-sm"></label>
      <label><span class="mb-1 block text-xs text-slate-600">权重</span><input name="weight" value="1" class="w-full rounded-xl border border-slate-200 px-3 py-2 text-sm"></label>
      <label class="flex items-center gap-2 rounded-xl border border-slate-200 px-3 py-2 text-xs text-slate-600 md:col-span-2"><input type="checkbox" name="is_fallback" value="true">后备路由</label>
      <button type="submit" class="rounded-xl bg-slate-950 px-4 py-2 text-sm text-white md:col-span-2">创建路由</button>
    </form>
  </div>
</dialog>
<dialog id="edit-route-modal" class="w-full max-w-3xl rounded-2xl p-0 backdrop:bg-slate-950/50">
  <div class="rounded-2xl bg-white p-6">
    <div class="mb-4 flex items-center justify-between border-b border-slate-100 pb-4"><h3 class="text-lg font-semibold text-slate-800">编辑路由</h3><button type="button" onclick='closeModal("edit-route-modal")' class="rounded-full p-1.5 text-slate-400 hover:bg-slate-100 hover:text-slate-600 transition-colors"><svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd" /></svg></button></div>
    <form id="edit-route-form" method="post" class="grid gap-4 md:grid-cols-2">
      <input type="hidden" name="logical_model_id">
      <label><span class="mb-1 block text-xs text-slate-600">Provider</span><select name="provider_model_id" class="w-full rounded-xl border border-slate-200 px-3 py-2 text-sm">{% for item in provider_models %}<option value="{{ item.id }}">{{ item.name }}{% if item.description %} <span class="text-slate-400">({{ item.description }})</span>{% endif %}</option>{% endfor %}</select></label>
      <label><span class="mb-1 block text-xs text-slate-600">优先级</span><input name="priority" class="w-full rounded-xl border border-slate-200 px-3 py-2 text-sm"></label>
      <label><span class="mb-1 block text-xs text-slate-600">权重</span><input name="weight" class="w-full rounded-xl border border-slate-200 px-3 py-2 text-sm"></label>
      <label><span class="mb-1 block text-xs text-slate-600">状态</span><select name="status" class="w-full rounded-xl border border-slate-200 px-3 py-2 text-sm"><option value="active">active</option><option value="disabled">disabled</option></select></label>
      <label class="flex items-center gap-2 rounded-xl border border-slate-200 px-3 py-2 text-xs text-slate-600"><input type="checkbox" name="is_fallback" value="true">后备路由</label>
      <button type="submit" class="rounded-xl bg-slate-950 px-4 py-2 text-sm text-white md:col-span-2">保存</button>
    </form>
  </div>
</dialog>
<script>
let allLogicalModels = {{ logical_models|tojson }};
let allRoutesForModels = {{ routes|tojson }};
let currentLogicalModelPage = 1;
const logicalModelsPerPage = 10;

function getFilters() {
  return {
    name: document.getElementById('search-name').value.trim().toLowerCase(),
    status: document.getElementById('search-status').value,
  };
}

function renderLogicalModelsTable() {
  const { name, status } = getFilters();
  const filteredModels = allLogicalModels.filter(model => {
    if (name && !model.name.toLowerCase().includes(name) && !(model.description && model.description.toLowerCase().includes(name))) return false;
    if (status === 'active' && !model.is_active) return false;
    if (status === 'disabled' && model.is_active) return false;
    return true;
  });

  const tableContainer = document.getElementById('logical-models-table-container');
  const paginationContainer = document.getElementById('logical-models-pagination-container');
  tableContainer.innerHTML = '';
  paginationContainer.innerHTML = '';

  if (filteredModels.length === 0) {
    tableContainer.innerHTML = '<p class="text-center text-slate-500 p-4">没有找到相关模型。</p>';
    return;
  }

  const totalPages = Math.ceil(filteredModels.length / logicalModelsPerPage);
  const paginatedModels = filteredModels.slice((currentLogicalModelPage - 1) * logicalModelsPerPage, currentLogicalModelPage * logicalModelsPerPage);

  const table = document.createElement('table');
  table.className = 'w-full text-sm text-left text-slate-500';
  table.innerHTML = `
    <thead class="text-xs text-slate-700 uppercase bg-slate-50">
      <tr>
        <th scope="col" class="px-2 py-3 whitespace-nowrap">名称</th>
        <th scope="col" class="px-2 py-3 whitespace-nowrap">描述</th>
        <th scope="col" class="px-2 py-3 whitespace-nowrap">状态</th>
        <th scope="col" class="px-2 py-3 whitespace-nowrap">操作</th>
      </tr>
    </thead>
    <tbody>
    </tbody>
  `;
  const tbody = table.querySelector('tbody');
  paginatedModels.forEach(item => {
    const tr = document.createElement('tr');
    tr.className = 'bg-white border-b';
    tr.innerHTML = `
      <td class="px-2 py-2 text-xs font-medium text-slate-900 whitespace-nowrap">${item.name}</td>
      <td class="px-2 py-2 text-xs">${item.description || "无描述"}</td>
      <td class="px-2 py-2 text-xs whitespace-nowrap">${item.is_active ? '<span class="inline-flex items-center rounded-full bg-emerald-50 px-2.5 py-0.5 text-xs font-medium text-emerald-700">active</span>' : '<span class="inline-flex items-center rounded-full bg-rose-50 px-2.5 py-0.5 text-xs font-medium text-rose-700">disabled</span>'}</td>
      <td class="px-2 py-2 whitespace-nowrap"><div class="flex gap-2">
        <button type="button" onclick='openRoutesModalForModel(${item.id})' class="rounded-lg border border-sky-200 bg-sky-50 px-3 py-1.5 text-xs text-sky-700">路由</button>
        <button type="button" onclick='fillForm("edit-logical-model-form-${item.id}", ${JSON.stringify(item)}); openModal("edit-logical-model-modal-${item.id}")' class="rounded-lg border border-slate-200 px-3 py-1.5 text-xs">编辑</button>
        <button type="button" onclick="deleteLogicalModel(${item.id}, '${item.name.replace(/'/g, '\\\'')}')" class="rounded-lg border border-rose-200 bg-rose-50 px-3 py-1.5 text-xs text-rose-700">删除</button>
      </div></td>
    `;
    tbody.appendChild(tr);
  });
  tableContainer.appendChild(table);

  // Pagination
  const paginDiv = document.createElement('div');
  paginDiv.className = 'flex items-center gap-2';

  const prevButton = document.createElement('button');
  prevButton.textContent = '上一页';
  prevButton.className = 'rounded-lg border px-3 py-1.5 text-xs' + (currentLogicalModelPage === 1 ? ' text-slate-400' : '');
  prevButton.disabled = currentLogicalModelPage === 1;
  prevButton.onclick = () => { currentLogicalModelPage--; renderLogicalModelsTable(); };
  paginDiv.appendChild(prevButton);

  const pageInfo = document.createElement('span');
  pageInfo.textContent = `第 ${currentLogicalModelPage} / ${totalPages} 页`;
  pageInfo.className = 'text-xs text-slate-500';
  paginDiv.appendChild(pageInfo);

  const nextButton = document.createElement('button');
  nextButton.textContent = '下一页';
  nextButton.className = 'rounded-lg border px-3 py-1.5 text-xs' + (currentLogicalModelPage === totalPages ? ' text-slate-400' : '');
  nextButton.disabled = currentLogicalModelPage === totalPages;
  nextButton.onclick = () => { currentLogicalModelPage++; renderLogicalModelsTable(); };
  paginDiv.appendChild(nextButton);

  paginationContainer.appendChild(paginDiv);
}

function deleteLogicalModel(id, name) {
  if (!confirm('确认删除逻辑模型「' + name + '」吗？\n\n请确保已删除该模型下的所有路由。')) return;
  fetch('/admin/logical-models/' + id + '/delete', { method: 'POST' })
    .then(res => res.json())
    .then(result => {
      if (result.ok) {
        allLogicalModels = allLogicalModels.filter(m => m.id !== id);
        allRoutesForModels = allRoutesForModels.filter(r => r.logical_model_id !== id);
        const totalPages = Math.ceil(allLogicalModels.length / logicalModelsPerPage);
        if (currentLogicalModelPage > 1 && currentLogicalModelPage > totalPages) currentLogicalModelPage = Math.max(1, totalPages);
        renderLogicalModelsTable();
        showToast('「' + name + '」 已删除');
      } else {
        showToast(result.error || '删除失败', 'error');
      }
    })
    .catch(() => showToast('网络错误，请重试', 'error'));
}

document.getElementById('search-btn').addEventListener('click', () => {
  currentLogicalModelPage = 1;
  renderLogicalModelsTable();
});

document.getElementById('reset-btn').addEventListener('click', () => {
  document.getElementById('search-name').value = '';
  document.getElementById('search-status').value = '';
  currentLogicalModelPage = 1;
  renderLogicalModelsTable();
});

document.getElementById('search-name').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') { currentLogicalModelPage = 1; renderLogicalModelsTable(); }
});

document.addEventListener('DOMContentLoaded', () => {
  renderLogicalModelsTable();
});


let currentLogicalModelId = null;
let currentRoutes = [];
let currentRoutePage = 1;
const routesPerPage = 5;

function openRoutesModalForModel(logicalModelId) {
  const routesForModel = allRoutesForModels.filter(r => r.logical_model_id === logicalModelId);
  openRoutesModal(logicalModelId, routesForModel);
}

let routeHealthMap = {};

async function fetchRoutesHealth(routes) {
  await Promise.all(routes.map(async (route) => {
    try {
      const resp = await fetch(`/admin/routes/${route.id}/degraded-status`);
      if (resp.ok) {
        routeHealthMap[route.id] = await resp.json();
      }
    } catch (e) { /* ignore */ }
  }));
}

async function recoverRoute(routeId) {
  try {
    const resp = await fetch(`/admin/routes/${routeId}/recover`, { method: 'POST' });
    const data = await resp.json();
    if (resp.ok) {
      routeHealthMap[routeId] = { degraded: false };
      renderRoutesTable();
    } else {
      alert(data.detail || '恢复失败');
    }
  } catch (e) {
    alert('请求失败，请重试');
  }
}

async function openRoutesModal(logicalModelId, routes) {
  currentLogicalModelId = logicalModelId;
  currentRoutes = routes;
  routeHealthMap = {};
  document.getElementById('routes-search').value = '';
  currentRoutePage = 1;
  openModal('routes-modal');
  renderRoutesTable();
  await fetchRoutesHealth(routes);
  renderRoutesTable();
}

function renderRoutesTable() {
  const searchTerm = document.getElementById('routes-search').value.toLowerCase();
  const filteredRoutes = currentRoutes.filter(route => {
    const providerModel = {{ provider_models|tojson }}.find(p => p.id === route.provider_model_id);
    return (providerModel && (providerModel.name.toLowerCase().includes(searchTerm) || (providerModel.description && providerModel.description.toLowerCase().includes(searchTerm)))) ||
           String(route.priority).includes(searchTerm) ||
           String(route.weight).includes(searchTerm) ||
           route.status.toLowerCase().includes(searchTerm);
  });

  const tableContainer = document.getElementById('routes-table-container');
  const paginationContainer = document.getElementById('routes-pagination-container');
  tableContainer.innerHTML = '';
  paginationContainer.innerHTML = '';

  if (filteredRoutes.length === 0) {
    tableContainer.innerHTML = '<p class="text-center text-slate-500 p-4">没有找到相关路由。</p>';
    return;
  }

  const totalPages = Math.ceil(filteredRoutes.length / routesPerPage);
  const paginatedRoutes = filteredRoutes.slice((currentRoutePage - 1) * routesPerPage, currentRoutePage * routesPerPage);

  const table = document.createElement('table');
  table.className = 'w-full text-sm text-left text-slate-500';
  table.innerHTML = `
    <thead class="text-xs text-slate-700 uppercase bg-slate-50">
      <tr>
        <th scope="col" class="px-2 py-3 whitespace-nowrap">Provider</th>
        <th scope="col" class="px-2 py-3 whitespace-nowrap">优先级</th>
        <th scope="col" class="px-2 py-3 whitespace-nowrap">权重</th>
        <th scope="col" class="px-2 py-3 whitespace-nowrap">状态</th>
        <th scope="col" class="px-2 py-3 whitespace-nowrap">后备</th>
        <th scope="col" class="px-2 py-3 whitespace-nowrap">健康状态</th>
        <th scope="col" class="px-2 py-3 whitespace-nowrap">操作</th>
      </tr>
    </thead>
    <tbody>
    </tbody>
  `;
  const tbody = table.querySelector('tbody');
  paginatedRoutes.forEach(route => {
    const providerModel = {{ provider_models|tojson }}.find(p => p.id === route.provider_model_id);
    const health = routeHealthMap[route.id];
    let healthBadge;
    if (health === undefined) {
      healthBadge = '<span class="text-slate-300 text-xs">--</span>';
    } else if (!health.degraded) {
      healthBadge = '<span class="inline-flex items-center rounded-full bg-emerald-50 px-2.5 py-0.5 text-xs font-medium text-emerald-700">健康</span>';
    } else {
      const typeLabel = health.degraded_type === 'quota_exhausted' ? '配额耗尽' : (health.degraded_type || '异常');
      healthBadge = `<span class="inline-flex items-center rounded-full bg-rose-50 px-2.5 py-0.5 text-xs font-medium text-rose-700">降级</span><span class="ml-1 text-xs text-slate-400">${typeLabel}</span>`;
    }
    const recoverBtn = (health && health.degraded)
      ? `<button type="button" onclick="recoverRoute(${route.id})" class="rounded-lg border border-amber-200 bg-amber-50 px-3 py-1.5 text-xs text-amber-700">立即恢复</button>`
      : '';
    const tr = document.createElement('tr');
    tr.className = 'bg-white border-b';
    tr.innerHTML = `
      <td class="px-2 py-2 text-xs whitespace-nowrap">${providerModel ? (providerModel.description ? `${providerModel.name} <span class="text-slate-400">(${providerModel.description})</span>` : providerModel.name) : 'N/A'}</td>
      <td class="px-2 py-2 text-xs whitespace-nowrap">${route.priority}</td>
      <td class="px-2 py-2 text-xs whitespace-nowrap">${route.weight}</td>
      <td class="px-2 py-2 text-xs whitespace-nowrap">${route.status}</td>
      <td class="px-2 py-2 text-xs whitespace-nowrap">${route.is_fallback ? '是' : '否'}</td>
      <td class="px-2 py-2 text-xs whitespace-nowrap">${healthBadge}</td>
      <td class="px-2 py-2 whitespace-nowrap"><div class="flex gap-2">
        ${recoverBtn}
        <button type="button" onclick='openEditRouteModal(${JSON.stringify(route)})' class="rounded-lg border border-slate-200 px-3 py-1.5 text-xs">编辑</button>
        <form method="post" action="/admin/routes/${route.id}/delete" onsubmit="return confirm('确认删除这个路由吗？');">
          <button class="rounded-lg border border-rose-200 bg-rose-50 px-3 py-1.5 text-xs text-rose-700">删除</button>
        </form>
      </div></td>
    `;
    tbody.appendChild(tr);
  });
  tableContainer.appendChild(table);

  // Pagination
  const rPaginDiv = document.createElement('div');
  rPaginDiv.className = 'flex items-center gap-2';

  const rPrevButton = document.createElement('button');
  rPrevButton.textContent = '上一页';
  rPrevButton.className = 'rounded-lg border px-3 py-1.5 text-xs' + (currentRoutePage === 1 ? ' text-slate-400' : '');
  rPrevButton.disabled = currentRoutePage === 1;
  rPrevButton.onclick = () => { currentRoutePage--; renderRoutesTable(); };
  rPaginDiv.appendChild(rPrevButton);

  const rPageInfo = document.createElement('span');
  rPageInfo.textContent = `第 ${currentRoutePage} / ${totalPages} 页`;
  rPageInfo.className = 'text-xs text-slate-500';
  rPaginDiv.appendChild(rPageInfo);

  const rNextButton = document.createElement('button');
  rNextButton.textContent = '下一页';
  rNextButton.className = 'rounded-lg border px-3 py-1.5 text-xs' + (currentRoutePage === totalPages ? ' text-slate-400' : '');
  rNextButton.disabled = currentRoutePage === totalPages;
  rNextButton.onclick = () => { currentRoutePage++; renderRoutesTable(); };
  rPaginDiv.appendChild(rNextButton);

  paginationContainer.appendChild(rPaginDiv);
}

function openCreateRouteModal() {
  const form = document.getElementById('create-route-form');
  form.reset();
  form.querySelector('[name="logical_model_id"]').value = currentLogicalModelId;
  openModal('create-route-modal');
}

function openEditRouteModal(route) {
  const form = document.getElementById('edit-route-form');
  form.action = `/admin/routes/${route.id}`;
  fillForm('edit-route-form', {
    ...route,
    logical_model_id: currentLogicalModelId
  });
  openModal('edit-route-modal');
}

document.getElementById('routes-search').addEventListener('input', () => {
  currentRoutePage = 1;
  renderRoutesTable();
});
</script>
{% endblock %}
