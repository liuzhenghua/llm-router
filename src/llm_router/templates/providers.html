{% extends "base.html" %}
{% block page_content %}
<div class="sticky top-0 z-10 -mx-3 lg:-mx-5 -mt-4 lg:-mt-5 mb-4 flex items-center justify-between border-b border-slate-200/70 bg-white/90 px-3 py-2.5 backdrop-blur-sm lg:px-5">
  <div>
    <p class="text-xs uppercase tracking-[0.35em] text-slate-400" data-i18n="nav.providers">Model Sources</p>
    <h1 class="mt-0.5 text-xl font-semibold tracking-tight text-slate-900" data-i18n="providers.title">模型源</h1>
  </div>
  <button type="button" onclick="openModal('create-provider-modal')" class="rounded-2xl bg-slate-950 px-4 py-2.5 text-xs font-medium text-white" data-i18n="providers.add">新增模型源</button>
</div>

<div class="mb-4 flex flex-wrap gap-2 items-end">
  <div class="min-w-[180px] flex-1">
    <label class="block text-xs text-slate-500 mb-1" data-i18n="common.name">名称</label>
    <input type="text" id="search-name" placeholder="搜索名称..." data-i18n-placeholder="api_keys.search_name" class="w-full rounded-xl border border-slate-200 px-3 py-1.5 text-xs">
  </div>
  <div class="shrink-0 w-[130px]">
    <label class="block text-xs text-slate-500 mb-1" data-i18n="common.status">状态</label>
    <select id="search-status" class="w-full rounded-xl border border-slate-200 px-3 py-1.5 text-xs">
      <option value="" data-i18n="common.all">全部</option>
      <option value="active">active</option>
      <option value="disabled">disabled</option>
    </select>
  </div>
  <div class="flex gap-2 shrink-0">
    <button id="search-btn" class="rounded-xl bg-slate-800 px-3 py-1.5 text-xs text-white font-medium hover:bg-slate-700" data-i18n="common.search">搜索</button>
    <button id="reset-btn" class="rounded-xl border border-slate-300 px-3 py-1.5 text-xs text-slate-700 font-medium hover:bg-slate-50" data-i18n="common.reset">重置</button>
  </div>
</div>

<div id="providers-table-container" class="overflow-x-auto rounded-2xl bg-white shadow-sm"></div>
<div id="providers-pagination-container" class="mt-2 flex items-center justify-between"></div>

{% for item in provider_models %}

    <form id="edit-provider-form-{{ item.id }}" method="post" action="/admin/provider-models/{{ item.id }}" class="grid gap-4 md:grid-cols-2" onsubmit="return validateProviderForm(this)">

      <button type="submit" class="rounded-xl bg-slate-950 px-4 py-2 text-sm text-white md:col-span-2" data-i18n="common.save">保存</button>
    </form>
  </div>
</dialog>

<script>
let allProviders = {{ provider_models|tojson }};
let currentPage = 1;
const rowsPerPage = 10;

function validateProviderForm(form) {
  const oe = form.querySelector('[name="openai_endpoint"]').value.trim();
  const ae = form.querySelector('[name="anthropic_endpoint"]').value.trim();
  if (!oe && !ae) {
    showToast(t('providers.validate_endpoint'), 'error');
    return false;
  }
  for (const fieldName of ['openai_payload_overrides', 'anthropic_payload_overrides']) {
    const input = form.querySelector(`[name="${fieldName}"]`);
    const raw = input.value.trim();
    if (!raw) continue;
    try {
      const parsed = JSON.parse(raw);
      if (!parsed || Array.isArray(parsed) || typeof parsed !== 'object') throw new Error('object required');
    } catch (e) {
      showToast(fieldName + ' 必须是 JSON object', 'error');
      input.focus();
      return false;
    }
  }
  return true;
}

const payloadOverrideTemplates = {
  openai_disable_thinking: {
    openai_payload_overrides: {
      thinking: { type: 'disabled' },
      chat_template_kwargs: { thinking: false },
    },
  },
  enable_thinking: {
    anthropic_payload_overrides: {
      thinking: { type: 'adaptive' },
    },
  },
  limit_output: {
    openai_payload_overrides: {
      max_tokens: 1024,
    },
    anthropic_payload_overrides: {
      max_tokens: 1024,
    },
  },
};

function deepMerge(target, source) {
  Object.entries(source).forEach(([key, value]) => {
    if (value && typeof value === 'object' && !Array.isArray(value) && target[key] && typeof target[key] === 'object' && !Array.isArray(target[key])) {
      deepMerge(target[key], value);
    } else {
      target[key] = value;
    }
  });
  return target;
}

function applyPayloadOverrideTemplate(form, fieldName, templateName) {
  const input = form.querySelector(`[name="${fieldName}"]`);
  if (input.readOnly) {
    showToast(t('providers.payload_overrides_disabled'), 'info');
    return;
  }
  const template = payloadOverrideTemplates[templateName][fieldName];
  let current = {};
  if (input.value.trim()) {
    try {
      current = JSON.parse(input.value);
    } catch (e) {
      showToast(fieldName + ' 必须是 JSON object', 'error');
      input.focus();
      return;
    }
  }
  input.value = JSON.stringify(deepMerge(current, template), null, 2);
}

function updatePayloadOverrideState(form) {
  if (!form) return;
  const pairs = [
    { endpoint: 'openai_endpoint', field: 'openai_payload_overrides' },
    { endpoint: 'anthropic_endpoint', field: 'anthropic_payload_overrides' },
  ];
  pairs.forEach(({ endpoint, field }) => {
    const endpointInput = form.querySelector(`[name="${endpoint}"]`);
    const payloadInput = form.querySelector(`[name="${field}"]`);
    const group = form.querySelector(`[data-payload-group="${field}"]`);
    const buttons = form.querySelectorAll(`[data-payload-field="${field}"]`);
    if (!endpointInput || !payloadInput) return;

    const enabled = !!endpointInput.value.trim();
    payloadInput.readOnly = !enabled;
    payloadInput.setAttribute('aria-disabled', String(!enabled));
    payloadInput.classList.toggle('bg-slate-50', !enabled);
    payloadInput.classList.toggle('text-slate-400', !enabled);
    payloadInput.classList.toggle('cursor-not-allowed', !enabled);
    payloadInput.classList.toggle('focus:ring-0', !enabled);
    if (group) group.classList.toggle('opacity-60', !enabled);
    buttons.forEach(button => {
      button.disabled = !enabled;
      button.classList.toggle('opacity-50', !enabled);
      button.classList.toggle('cursor-not-allowed', !enabled);
    });
  });
}

function setupPayloadOverrideControls(form) {
  if (!form) return;
  ['openai_endpoint', 'anthropic_endpoint'].forEach(name => {
    const input = form.querySelector(`[name="${name}"]`);
    if (input) input.addEventListener('input', () => updatePayloadOverrideState(form));
  });
  updatePayloadOverrideState(form);
}

function getFilters() {
  return {
    name: document.getElementById('search-name').value.trim().toLowerCase(),
    status: document.getElementById('search-status').value,
  };
}

function renderTable() {
  const { name, status } = getFilters();
  const filteredProviders = allProviders.filter(provider => {
    if (name && !provider.name.toLowerCase().includes(name) && !(provider.description && provider.description.toLowerCase().includes(name))) return false;
    if (status === 'active' && !provider.is_active) return false;
    if (status === 'disabled' && provider.is_active) return false;
    return true;
  });

  const tableContainer = document.getElementById('providers-table-container');
  const paginationContainer = document.getElementById('providers-pagination-container');
  tableContainer.innerHTML = '';
  paginationContainer.innerHTML = '';

  if (filteredProviders.length === 0) {
    tableContainer.innerHTML = '<p class="text-center text-slate-500 p-4">' + t('providers.no_data') + '</p>';
    return;
  }

  const totalPages = Math.ceil(filteredProviders.length / rowsPerPage);
  if (currentPage > totalPages) currentPage = totalPages;
  const paginatedProviders = filteredProviders.slice((currentPage - 1) * rowsPerPage, currentPage * rowsPerPage);

  const table = document.createElement('table');
  table.className = 'w-full text-sm text-left text-slate-500';
  table.innerHTML = `
    <thead class="text-xs text-slate-700 uppercase bg-slate-50">
      <tr>
        <th scope="col" class="px-2 py-3 whitespace-nowrap">${t('common.name')}</th>
        <th scope="col" class="px-2 py-3 whitespace-nowrap">${t('common.description')}</th>
        <th scope="col" class="px-2 py-3 whitespace-nowrap">OpenAI Endpoint</th>
        <th scope="col" class="px-2 py-3 whitespace-nowrap">Anthropic Endpoint</th>
        <th scope="col" class="px-2 py-3 whitespace-nowrap">${t('providers.lbl_strip_image_short')}</th>
        <th scope="col" class="px-2 py-3 whitespace-nowrap">${t('common.status')}</th>
        <th scope="col" class="px-2 py-3 whitespace-nowrap">${t('common.actions')}</th>
      </tr>
    </thead>
    <tbody>
    </tbody>
  `;
  const tbody = table.querySelector('tbody');
  paginatedProviders.forEach(item => {
    const tr = document.createElement('tr');
    tr.className = 'bg-white border-b';
    tr.innerHTML = `
      <td class="px-2 py-2 text-xs font-medium text-slate-900 whitespace-nowrap">${item.name}</td>
      <td class="px-2 py-2 text-xs">${item.description || '<span class="text-slate-300">—</span>'}</td>
      <td class="px-2 py-2 text-xs">${item.openai_endpoint || '<span class="text-slate-300">—</span>'}</td>
      <td class="px-2 py-2 text-xs">${item.anthropic_endpoint || '<span class="text-slate-300">—</span>'}</td>
      <td class="px-2 py-2 text-xs whitespace-nowrap">${item.strip_image_content ? '<span class="inline-flex items-center rounded-full bg-sky-50 px-2.5 py-0.5 text-xs font-medium text-sky-700">on</span>' : '<span class="text-slate-300">—</span>'}</td>
      <td class="px-2 py-2 text-xs whitespace-nowrap">${item.is_active ? '<span class="inline-flex items-center rounded-full bg-emerald-50 px-2.5 py-0.5 text-xs font-medium text-emerald-700">active</span>' : '<span class="inline-flex items-center rounded-full bg-rose-50 px-2.5 py-0.5 text-xs font-medium text-rose-700">disabled</span>'}</td>
      <td class="px-2 py-2 whitespace-nowrap"><div class="flex gap-2">
        <button type="button" onclick='fillForm("edit-provider-form-${item.id}", ${JSON.stringify(item)}); toggleCacheFieldsById("edit-supports-prompt-cache-${item.id}", "cache-inputs-${item.id}", ${item.supports_prompt_cache}); updatePayloadOverrideState(document.getElementById("edit-provider-form-${item.id}")); openModal("edit-provider-modal-${item.id}")' class="rounded-lg border border-slate-200 px-3 py-1.5 text-xs">${t('common.edit')}</button>
        <button type="button" onclick="copyProvider(${item.id})" class="rounded-lg border border-sky-200 bg-sky-50 px-3 py-1.5 text-xs text-sky-700">${t('providers.btn_copy')}</button>
        <button type="button" onclick="deleteProvider(${item.id}, '${item.name.replace(/'/g, '\\\'')}')" class="rounded-lg border border-rose-200 bg-rose-50 px-3 py-1.5 text-xs text-rose-700">${t('common.delete')}</button>
      </div></td>
    `;
    tbody.appendChild(tr);
  });
  tableContainer.appendChild(table);

  // Pagination
  const paginDiv = document.createElement('div');
  paginDiv.className = 'flex items-center gap-2';

  const prevButton = document.createElement('button');
  prevButton.textContent = t('common.prev_page');
  prevButton.className = 'rounded-lg border px-3 py-1.5 text-xs' + (currentPage === 1 ? ' text-slate-400' : '');
  prevButton.disabled = currentPage === 1;
  prevButton.onclick = () => { currentPage--; renderTable(); };
  paginDiv.appendChild(prevButton);

  const pageInfo = document.createElement('span');
  pageInfo.textContent = t('common.page_info').replace('{cur}', currentPage).replace('{total}', totalPages);
  pageInfo.className = 'text-xs text-slate-500';
  paginDiv.appendChild(pageInfo);

  const nextButton = document.createElement('button');
  nextButton.textContent = t('common.next_page');
  nextButton.className = 'rounded-lg border px-3 py-1.5 text-xs' + (currentPage === totalPages ? ' text-slate-400' : '');
  nextButton.disabled = currentPage === totalPages;
  nextButton.onclick = () => { currentPage++; renderTable(); };
  paginDiv.appendChild(nextButton);

  paginationContainer.appendChild(paginDiv);
}

function deleteProvider(id, name) {
  if (!confirm(t('providers.confirm_delete').replace('{name}', name))) return;
  fetch('/admin/provider-models/' + id + '/delete', { method: 'POST' })
    .then(res => res.json())
    .then(result => {
      if (result.ok) {
        allProviders = allProviders.filter(p => p.id !== id);
        const totalPages = Math.ceil(allProviders.length / rowsPerPage);
        if (currentPage > 1 && currentPage > totalPages) currentPage = Math.max(1, totalPages);
        renderTable();
        showToast(t('providers.toast_deleted') + '「' + name + '」');
      } else {
        showToast(result.error || t('common.delete_fail'), 'error');
      }
    })
    .catch(() => showToast(t('common.network_error'), 'error'));
}

function copyProvider(id) {
  const item = allProviders.find(p => p.id === id);
  if (!item) return;
  fillForm('create-provider-form', item);
  updatePayloadOverrideState(document.getElementById('create-provider-form'));
  openModal('create-provider-modal');
}

function toggleCacheFieldsById(checkboxId, containerId, value) {
  const checkbox = document.getElementById(checkboxId);
  const container = document.getElementById(containerId);
  if (checkbox && container) {
    checkbox.checked = !!value;
    container.classList.toggle('hidden', !value);
  }
}

document.getElementById('search-btn').addEventListener('click', () => {
  currentPage = 1;
  renderTable();
});

document.getElementById('reset-btn').addEventListener('click', () => {
  document.getElementById('search-name').value = '';
  document.getElementById('search-status').value = '';
  currentPage = 1;
  renderTable();
});

document.getElementById('search-name').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') { currentPage = 1; renderTable(); }
});

document.addEventListener('DOMContentLoaded', () => {
  document.querySelectorAll('form[id^="create-provider-form"], form[id^="edit-provider-form-"]').forEach(setupPayloadOverrideControls);
  renderTable();
});
window.i18n && window.i18n.onLangChange(renderTable);
</script>
{% endblock %}
