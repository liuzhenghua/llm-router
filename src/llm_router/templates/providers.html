{% extends "base.html" %}
{% block page_content %}
<div class="sticky top-0 z-10 -mx-3 lg:-mx-5 -mt-4 lg:-mt-5 mb-4 flex items-center justify-between border-b border-slate-200/70 bg-white/90 px-3 py-4 backdrop-blur-sm lg:px-5">
  <div>
    <p class="text-xs uppercase tracking-[0.35em] text-sky-600">Providers</p>
    <h1 class="mt-0.5 text-xl font-semibold tracking-tight text-slate-900">下游 Provider</h1>
  </div>
  <button type="button" onclick="openModal('create-provider-modal')" class="rounded-2xl bg-slate-950 px-4 py-2.5 text-xs font-medium text-white">新增 Provider</button>
</div>

<div class="mb-4 flex flex-wrap gap-2 items-end">
  <div class="min-w-[180px] flex-1">
    <label class="block text-xs text-slate-500 mb-1">名称</label>
    <input type="text" id="search-name" placeholder="搜索名称..." class="w-full rounded-xl border border-slate-200 px-3 py-1.5 text-xs">
  </div>
  <div class="shrink-0 w-[130px]">
    <label class="block text-xs text-slate-500 mb-1">状态</label>
    <select id="search-status" class="w-full rounded-xl border border-slate-200 px-3 py-1.5 text-xs">
      <option value="">全部</option>
      <option value="active">active</option>
      <option value="disabled">disabled</option>
    </select>
  </div>
  <div class="flex gap-2 shrink-0">
    <button id="search-btn" class="rounded-xl bg-slate-800 px-3 py-1.5 text-xs text-white font-medium hover:bg-slate-700">搜索</button>
    <button id="reset-btn" class="rounded-xl border border-slate-300 px-3 py-1.5 text-xs text-slate-700 font-medium hover:bg-slate-50">重置</button>
  </div>
</div>

<div id="providers-table-container" class="overflow-x-auto rounded-2xl bg-white shadow-sm"></div>
<div id="providers-pagination-container" class="mt-2 flex items-center justify-between"></div>

{% for item in provider_models %}
<dialog id="edit-provider-modal-{{ item.id }}" class="w-full max-w-4xl rounded-2xl p-0 backdrop:bg-slate-950/50">
  <div class="rounded-2xl bg-white p-6">
    <div class="mb-4 flex items-center justify-between border-b border-slate-100 pb-4"><h3 class="text-lg font-semibold text-slate-800">编辑 Provider</h3><button type="button" onclick='closeModal("edit-provider-modal-{{ item.id }}")' class="rounded-full p-1.5 text-slate-400 hover:bg-slate-100 hover:text-slate-600 transition-colors"><svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd" /></svg></button></div>
    <form id="edit-provider-form-{{ item.id }}" method="post" action="/admin/provider-models/{{ item.id }}" class="grid gap-4 md:grid-cols-2">
      <label><span class="mb-1 block text-xs text-slate-600">名称</span><input name="name" class="w-full rounded-xl border border-slate-200 px-3 py-2 text-sm"></label>
      <label><span class="mb-1 block text-xs text-slate-600">上游模型名</span><input name="upstream_model_name" class="w-full rounded-xl border border-slate-200 px-3 py-2 text-sm"></label>
      <label class="md:col-span-2"><span class="mb-1 block text-xs text-slate-600">OpenAI Endpoint <span class="text-slate-400">（与 Anthropic Endpoint 至少填一个）</span></span><input name="openai_endpoint" placeholder="https://..." class="w-full rounded-xl border border-slate-200 px-3 py-2 text-sm"></label>
      <label class="md:col-span-2"><span class="mb-1 block text-xs text-slate-600">Anthropic Endpoint <span class="text-slate-400">（与 OpenAI Endpoint 至少填一个）</span></span><input name="anthropic_endpoint" placeholder="https://..." class="w-full rounded-xl border border-slate-200 px-3 py-2 text-sm"></label>
      <label><span class="mb-1 block text-xs text-slate-600">新 API Key</span><input name="api_key_secret" placeholder="留空表示不更新" class="w-full rounded-xl border border-slate-200 px-3 py-2 text-sm"></label>
      <label><span class="mb-1 block text-xs text-slate-600">输入单价 / 1M</span><input name="input_token_price" class="w-full rounded-xl border border-slate-200 px-3 py-2 text-sm"></label>
      <label><span class="mb-1 block text-xs text-slate-600">输出单价 / 1M</span><input name="output_token_price" class="w-full rounded-xl border border-slate-200 px-3 py-2 text-sm"></label>
      <label class="flex items-center gap-2 rounded-xl border border-slate-200 px-3 py-2 text-xs text-slate-600"><input type="checkbox" id="edit-supports-prompt-cache-{{ item.id }}" name="supports_prompt_cache" value="true" onchange="toggleCacheFields(this)" class="h-4 w-4 rounded border-slate-300">支持 Prompt Cache</label>
      <div id="cache-inputs-{{ item.id }}" class="hidden md:col-span-2">
        <div class="ml-6 grid gap-4 md:grid-cols-2">
          <label><span class="mb-1 block text-xs text-slate-600">Cache Read / 1M</span><input name="cache_read_token_price" class="w-full rounded-xl border border-slate-200 px-3 py-2 text-sm"></label>
          <label><span class="mb-1 block text-xs text-slate-600">Cache Write / 1M</span><input name="cache_write_token_price" class="w-full rounded-xl border border-slate-200 px-3 py-2 text-sm"></label>
        </div>
      </div>
      <label><span class="mb-1 block text-xs text-slate-600">超时秒数</span><input name="timeout_seconds" class="w-full rounded-xl border border-slate-200 px-3 py-2 text-sm"></label>
      <div class="flex gap-3">
        <label class="flex flex-1 items-center gap-2 rounded-xl border border-slate-200 px-3 py-2 text-xs text-slate-600"><input type="checkbox" name="is_active" value="true">启用</label>
      </div>
      <button type="submit" class="rounded-xl bg-slate-950 px-4 py-2 text-sm text-white md:col-span-2">保存</button>
    </form>
  </div>
</dialog>
{% endfor %}

<dialog id="create-provider-modal" class="w-full max-w-4xl rounded-2xl p-0 backdrop:bg-slate-950/50">
  <div class="rounded-2xl bg-white p-6">
    <div class="mb-4 flex items-center justify-between border-b border-slate-100 pb-4"><h3 class="text-lg font-semibold text-slate-800">新增 Provider</h3><button type="button" onclick='closeModal("create-provider-modal")' class="rounded-full p-1.5 text-slate-400 hover:bg-slate-100 hover:text-slate-600 transition-colors"><svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd" /></svg></button></div>
    <form id="create-provider-form" method="post" action="/admin/provider-models" class="grid gap-4 md:grid-cols-2" onsubmit="return validateProviderForm(this)">
      <label><span class="mb-1 block text-xs text-slate-600">名称</span><input name="name" class="w-full rounded-xl border border-slate-200 px-3 py-2 text-sm" required></label>
      <label><span class="mb-1 block text-xs text-slate-600">上游模型名</span><input name="upstream_model_name" class="w-full rounded-xl border border-slate-200 px-3 py-2 text-sm" required></label>
      <label class="md:col-span-2"><span class="mb-1 block text-xs text-slate-600">OpenAI Endpoint <span class="text-slate-400">（与 Anthropic Endpoint 至少填一个）</span></span><input name="openai_endpoint" placeholder="https://..." class="w-full rounded-xl border border-slate-200 px-3 py-2 text-sm"></label>
      <label class="md:col-span-2"><span class="mb-1 block text-xs text-slate-600">Anthropic Endpoint <span class="text-slate-400">（与 OpenAI Endpoint 至少填一个）</span></span><input name="anthropic_endpoint" placeholder="https://..." class="w-full rounded-xl border border-slate-200 px-3 py-2 text-sm"></label>
      <label><span class="mb-1 block text-xs text-slate-600">API Key</span><input name="api_key_secret" class="w-full rounded-xl border border-slate-200 px-3 py-2 text-sm" required></label>
      <label><span class="mb-1 block text-xs text-slate-600">输入单价 / 1M</span><input name="input_token_price" value="0" class="w-full rounded-xl border border-slate-200 px-3 py-2 text-sm"></label>
      <label><span class="mb-1 block text-xs text-slate-600">输出单价 / 1M</span><input name="output_token_price" value="0" class="w-full rounded-xl border border-slate-200 px-3 py-2 text-sm"></label>
      <label class="flex items-center gap-2 rounded-xl border border-slate-200 px-3 py-2 text-xs text-slate-600"><input type="checkbox" id="supports_prompt_cache" name="supports_prompt_cache" value="true" onchange="toggleCacheFields(this)" class="h-4 w-4 rounded border-slate-300">支持 Prompt Cache</label>
      <div id="cache-inputs" class="hidden md:col-span-2">
        <div class="ml-6 grid gap-4 md:grid-cols-2">
          <label><span class="mb-1 block text-xs text-slate-600">Cache Read / 1M</span><input name="cache_read_token_price" value="0" class="w-full rounded-xl border border-slate-200 px-3 py-2 text-sm"></label>
          <label><span class="mb-1 block text-xs text-slate-600">Cache Write / 1M</span><input name="cache_write_token_price" value="0" class="w-full rounded-xl border border-slate-200 px-3 py-2 text-sm"></label>
        </div>
      </div>
      <button type="submit" class="rounded-xl bg-slate-950 px-4 py-2 text-sm text-white md:col-span-2">创建 Provider</button>
    </form>
  </div>
</dialog>

<script>
let allProviders = {{ provider_models|tojson }};
let currentPage = 1;
const rowsPerPage = 10;

function validateProviderForm(form) {
  const oe = form.querySelector('[name="openai_endpoint"]').value.trim();
  const ae = form.querySelector('[name="anthropic_endpoint"]').value.trim();
  if (!oe && !ae) {
    showToast('OpenAI Endpoint 与 Anthropic Endpoint 至少填一个', 'error');
    return false;
  }
  return true;
}

function getFilters() {
  return {
    name: document.getElementById('search-name').value.trim().toLowerCase(),
    status: document.getElementById('search-status').value,
  };
}

function renderTable() {
  const { name, status } = getFilters();
  const filteredProviders = allProviders.filter(provider => {
    if (name && !provider.name.toLowerCase().includes(name)) return false;
    if (status === 'active' && !provider.is_active) return false;
    if (status === 'disabled' && provider.is_active) return false;
    return true;
  });

  const tableContainer = document.getElementById('providers-table-container');
  const paginationContainer = document.getElementById('providers-pagination-container');
  tableContainer.innerHTML = '';
  paginationContainer.innerHTML = '';

  if (filteredProviders.length === 0) {
    tableContainer.innerHTML = '<p class="text-center text-slate-500 p-4">没有找到相关 Provider。</p>';
    return;
  }

  const totalPages = Math.ceil(filteredProviders.length / rowsPerPage);
  if (currentPage > totalPages) currentPage = totalPages;
  const paginatedProviders = filteredProviders.slice((currentPage - 1) * rowsPerPage, currentPage * rowsPerPage);

  const table = document.createElement('table');
  table.className = 'w-full text-sm text-left text-slate-500';
  table.innerHTML = `
    <thead class="text-xs text-slate-700 uppercase bg-slate-50">
      <tr>
        <th scope="col" class="px-2 py-3 whitespace-nowrap">名称</th>
        <th scope="col" class="px-2 py-3 whitespace-nowrap">OpenAI Endpoint</th>
        <th scope="col" class="px-2 py-3 whitespace-nowrap">Anthropic Endpoint</th>
        <th scope="col" class="px-2 py-3 whitespace-nowrap">状态</th>
        <th scope="col" class="px-2 py-3 whitespace-nowrap">操作</th>
      </tr>
    </thead>
    <tbody>
    </tbody>
  `;
  const tbody = table.querySelector('tbody');
  paginatedProviders.forEach(item => {
    const tr = document.createElement('tr');
    tr.className = 'bg-white border-b';
    tr.innerHTML = `
      <td class="px-2 py-2 text-xs font-medium text-slate-900 whitespace-nowrap">${item.name}</td>
      <td class="px-2 py-2 text-xs">${item.openai_endpoint || '<span class="text-slate-300">—</span>'}</td>
      <td class="px-2 py-2 text-xs">${item.anthropic_endpoint || '<span class="text-slate-300">—</span>'}</td>
      <td class="px-2 py-2 text-xs whitespace-nowrap">${item.is_active ? '<span class="inline-flex items-center rounded-full bg-emerald-50 px-2.5 py-0.5 text-xs font-medium text-emerald-700">active</span>' : '<span class="inline-flex items-center rounded-full bg-rose-50 px-2.5 py-0.5 text-xs font-medium text-rose-700">disabled</span>'}</td>
      <td class="px-2 py-2 whitespace-nowrap"><div class="flex gap-2">
        <button type="button" onclick='fillForm("edit-provider-form-${item.id}", ${JSON.stringify(item)}); toggleCacheFieldsById("edit-supports-prompt-cache-${item.id}", "cache-inputs-${item.id}", ${item.supports_prompt_cache}); openModal("edit-provider-modal-${item.id}")' class="rounded-lg border border-slate-200 px-3 py-1.5 text-xs">编辑</button>
        <form method="post" action="/admin/provider-models/${item.id}/delete" onsubmit="return confirm('确认禁用这个 Provider 吗？');">
          <button class="rounded-lg border border-rose-200 bg-rose-50 px-3 py-1.5 text-xs text-rose-700">禁用</button>
        </form>
      </div></td>
    `;
    tbody.appendChild(tr);
  });
  tableContainer.appendChild(table);

  // Pagination
  const paginDiv = document.createElement('div');
  paginDiv.className = 'flex items-center gap-2';

  const prevButton = document.createElement('button');
  prevButton.textContent = '上一页';
  prevButton.className = 'rounded-lg border px-3 py-1.5 text-xs' + (currentPage === 1 ? ' text-slate-400' : '');
  prevButton.disabled = currentPage === 1;
  prevButton.onclick = () => { currentPage--; renderTable(); };
  paginDiv.appendChild(prevButton);

  const pageInfo = document.createElement('span');
  pageInfo.textContent = `第 ${currentPage} / ${totalPages} 页`;
  pageInfo.className = 'text-xs text-slate-500';
  paginDiv.appendChild(pageInfo);

  const nextButton = document.createElement('button');
  nextButton.textContent = '下一页';
  nextButton.className = 'rounded-lg border px-3 py-1.5 text-xs' + (currentPage === totalPages ? ' text-slate-400' : '');
  nextButton.disabled = currentPage === totalPages;
  nextButton.onclick = () => { currentPage++; renderTable(); };
  paginDiv.appendChild(nextButton);

  paginationContainer.appendChild(paginDiv);
}

function toggleCacheFieldsById(checkboxId, containerId, value) {
  const checkbox = document.getElementById(checkboxId);
  const container = document.getElementById(containerId);
  if (checkbox && container) {
    checkbox.checked = !!value;
    container.classList.toggle('hidden', !value);
  }
}

document.getElementById('search-btn').addEventListener('click', () => {
  currentPage = 1;
  renderTable();
});

document.getElementById('reset-btn').addEventListener('click', () => {
  document.getElementById('search-name').value = '';
  document.getElementById('search-status').value = '';
  currentPage = 1;
  renderTable();
});

document.getElementById('search-name').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') { currentPage = 1; renderTable(); }
});

document.addEventListener('DOMContentLoaded', () => {
  renderTable();
});
</script>
{% endblock %}
