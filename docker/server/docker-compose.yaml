services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: llm_router
      MYSQL_USER: llm_router
      MYSQL_PASSWORD: llm_router
    command: ["mysqld", "--mysql-native-password=ON"]
    ports:
      - "3306:3306"
    volumes:
      - ./data/mysql:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis:/data
    command: redis-server --appendonly yes

  llm-router:
    build:
      context: ../..
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - mysql
      - redis
    environment:
      HOST: 0.0.0.0
      PORT: 8000
      SESSION_SECRET: server-session-secret
      APP_ENCRYPTION_KEY: server-encryption-secret
      ADMIN_USERS_FILE: /app/data/admin_users.json
      MYSQL_URL: mysql://llm_router@mysql:3306/llm_router
      MYSQL_PASSWORD: llm_router
      REDIS_URL: redis://redis:6379/0
    sysctls:
      net.ipv4.tcp_keepalive_time: 180
      net.ipv4.tcp_keepalive_intvl: 60
      net.ipv4.tcp_keepalive_probes: 3
      net.ipv4.tcp_retries2: 5
    ports:
      - "8000:8000"
    volumes:
      - ./data/app:/app/data
